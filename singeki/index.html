<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>進撃の巨人 クイズ</title>
<style>
    :root {
        /* 進撃の巨人らしい重厚感のあるカラーパレット */
        --bg-color: #1a1a1a;
        --poster-bg: #e8e3d8; /* 羊皮紙・壁のような色 */
        --border-color: #4a3b32; /* 革や木材を思わせる茶色 */
        --text-color: #2b1d14;
        --btn-color: #2d4a35; /* 調査兵団のマントの緑 */
        --btn-hover: #3d6348;
        --accent-color: #8b0000; /* 血や決意を示す赤 */
    }
    
    body {
        font-family: 'ヒラギノ明朝 ProN', 'Hiragino Mincho ProN', '游明朝', YuMincho, 'Noto Serif JP', serif;
        background-color: var(--bg-color);
        background-image: 
            linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
            url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.1"/></svg>');
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: var(--text-color);
    }

    #app {
        width: 100%;
        max-width: 600px;
        background-color: var(--poster-bg);
        border: 10px solid var(--border-color);
        border-style: double;
        border-radius: 4px;
        box-shadow: 0 15px 30px rgba(0,0,0,0.8), inset 0 0 50px rgba(0,0,0,0.1);
        padding: 30px 20px;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
    }

    .screen {
        display: none;
        flex-direction: column;
        align-items: center;
    }

    .screen.active {
        display: flex;
        animation: fadeIn 0.4s ease-out;
    }

    h1 {
        font-size: 2.8em;
        text-align: center;
        margin: 0 0 20px 0;
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 15px;
        letter-spacing: 4px;
        font-weight: bold;
        line-height: 1.2;
    }

    h2 {
        font-size: 1.4em;
        margin-bottom: 20px;
        text-align: center;
        letter-spacing: 2px;
    }

    button {
        background-color: var(--btn-color);
        color: #f4f1ea;
        border: 2px solid #1a2c1f;
        padding: 12px 20px;
        font-size: 1.1em;
        font-family: inherit;
        border-radius: 3px;
        cursor: pointer;
        margin: 8px;
        width: 85%;
        max-width: 320px;
        transition: background-color 0.2s, transform 0.1s;
        box-shadow: 2px 3px 6px rgba(0,0,0,0.4);
        letter-spacing: 1px;
    }

    button:hover {
        background-color: var(--btn-hover);
    }

    button:active {
        transform: translateY(2px);
        box-shadow: 1px 1px 2px rgba(0,0,0,0.4);
    }

    button:disabled {
        background-color: #7a7a7a;
        cursor: not-allowed;
        border-color: #444;
        box-shadow: none;
        transform: none;
    }

    .btn-return { background-color: #4a4a4a; border-color: #222; }
    .btn-return:hover { background-color: #5a5a5a; }
    
    .btn-record { background-color: var(--border-color); border-color: #2b1d14; }
    .btn-record:hover { background-color: #5c4a3d; }

    /* クイズ画面用スタイル */
    .header-info {
        width: 100%;
        display: flex;
        justify-content: space-between;
        font-size: 1.1em;
        font-weight: bold;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 10px;
    }

    .pt-display {
        color: var(--accent-color);
    }

    #question-text-4c {
        font-size: 1.25em;
        margin: 20px 0 30px 0;
        text-align: center;
        min-height: 80px;
        font-weight: bold;
        width: 95%;
        line-height: 1.6;
    }

    .options-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        align-items: center;
    }

    .option-btn {
        width: 100%;
        max-width: 400px;
        margin: 6px;
        font-size: 1.05em;
        padding: 15px;
        text-align: left;
        background-color: #f4f1ea;
        color: var(--text-color);
        border: 2px solid var(--border-color);
        border-radius: 5px;
        box-shadow: 1px 2px 4px rgba(0,0,0,0.1);
    }

    .option-btn:hover:not(:disabled) {
        background-color: #e5dfd3;
        color: var(--text-color);
    }

    /* レベル選択グリッド */
    .level-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        width: 90%;
        max-width: 400px;
        margin-bottom: 20px;
    }
    
    .level-grid button {
        width: 100%;
        margin: 0;
    }

    /* 結果画面用スタイル */
    .result-score {
        font-size: 4em;
        color: var(--accent-color);
        font-weight: bold;
        margin: 10px 0;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .result-rank {
        font-size: 2em;
        font-weight: bold;
        margin: 15px 0;
        color: var(--btn-color);
    }

    .result-comment {
        font-size: 1.2em;
        margin-bottom: 30px;
        text-align: center;
        padding: 0 20px;
        line-height: 1.5;
    }

    /* 記録画面用スタイル */
    .record-table-container {
        width: 90%;
        max-height: 350px;
        overflow-y: auto;
        margin-bottom: 20px;
        border: 1px solid var(--border-color);
    }

    .record-table {
        width: 100%;
        border-collapse: collapse;
    }
    
    .record-table th, .record-table td {
        border: 1px solid var(--border-color);
        padding: 12px;
        text-align: center;
        font-size: 1.1em;
    }
    
    .record-table th {
        background-color: rgba(74, 59, 50, 0.1);
        position: sticky;
        top: 0;
    }

    /* フィードバックアニメーション */
    #feedback {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        font-size: 5em;
        font-weight: bold;
        z-index: 10;
        text-shadow: 3px 3px 6px rgba(0,0,0,0.6);
        pointer-events: none;
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #feedback.show {
        transform: translate(-50%, -50%) scale(1);
    }
    .correct { color: #4CAF50; }
    .incorrect { color: #F44336; }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div id="app">
    <div id="home-screen" class="screen active">
        <h1>進撃の巨人<br><span style="font-size: 0.5em; color: var(--btn-color);">100問クイズ</span></h1>
        <h2>心臓を捧げる覚悟はあるか</h2>
        <button onclick="switchScreen('level-select-screen')">作戦を開始する (クイズへ)</button>
        <div style="height: 15px;"></div>
        <button class="btn-record" onclick="showRecords()">戦歴を見る (最高記録)</button>
        <div style="height: 15px;"></div>
        <button class="btn-return" onclick="window.location.href='../index.html'">アニメ選択へ戻る</button>
    </div>

    <div id="level-select-screen" class="screen">
        <h1>作戦難易度</h1>
        <h2>挑戦するレベルを選択せよ</h2>
        <div class="level-grid">
            <button onclick="start4ChoiceGame(1)">レベル 1</button>
            <button onclick="start4ChoiceGame(2)">レベル 2</button>
            <button onclick="start4ChoiceGame(3)">レベル 3</button>
            <button onclick="start4ChoiceGame(4)">レベル 4</button>
            <button onclick="start4ChoiceGame(5)">レベル 5</button>
            <button onclick="start4ChoiceGame(6)">レベル 6</button>
            <button onclick="start4ChoiceGame(7)">レベル 7</button>
            <button onclick="start4ChoiceGame(8)">レベル 8</button>
            <button onclick="start4ChoiceGame(9)">レベル 9</button>
            <button onclick="start4ChoiceGame(10)">レベル 10</button>
        </div>
        <button class="btn-record" onclick="showHome()">ホームに戻る</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="header-info">
            <span id="level-display">Lv.1</span>
            <span id="question-count">1 / 10 問</span>
            <span class="pt-display">体力: <span id="score-display">100</span></span>
        </div>
        <div id="question-text-4c">ここに問題文が表示されます</div>
        
        <div class="options-container">
            <button id="btn-opt-A" class="option-btn" onclick="checkAnswer('A')">選択肢A</button>
            <button id="btn-opt-B" class="option-btn" onclick="checkAnswer('B')">選択肢B</button>
            <button id="btn-opt-C" class="option-btn" onclick="checkAnswer('C')">選択肢C</button>
            <button id="btn-opt-D" class="option-btn" onclick="checkAnswer('D')">選択肢D</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h2 id="result-level">レベル 1 帰還報告</h2>
        <div>残り体力</div>
        <div id="final-score" class="result-score">100</div>
        <div id="final-rank" class="result-rank">調査兵団 団長</div>
        <div id="final-comment" class="result-comment">人類の希望となる素晴らしい成果だ！</div>
        <button onclick="switchScreen('level-select-screen')">別のレベルに挑む</button>
        <button class="btn-record" onclick="showHome()">ホームに戻る</button>
    </div>

    <div id="record-screen" class="screen">
        <h1>戦歴（自己最高記録）</h1>
        <div class="record-table-container">
            <table class="record-table">
                <tr><th>レベル 1</th><td id="rec-lv1">-</td></tr>
                <tr><th>レベル 2</th><td id="rec-lv2">-</td></tr>
                <tr><th>レベル 3</th><td id="rec-lv3">-</td></tr>
                <tr><th>レベル 4</th><td id="rec-lv4">-</td></tr>
                <tr><th>レベル 5</th><td id="rec-lv5">-</td></tr>
                <tr><th>レベル 6</th><td id="rec-lv6">-</td></tr>
                <tr><th>レベル 7</th><td id="rec-lv7">-</td></tr>
                <tr><th>レベル 8</th><td id="rec-lv8">-</td></tr>
                <tr><th>レベル 9</th><td id="rec-lv9">-</td></tr>
                <tr><th>レベル 10</th><td id="rec-lv10">-</td></tr>
            </table>
        </div>
        <button class="btn-record" onclick="showHome()">ホームに戻る</button>
    </div>

    <div id="feedback"></div>
</div>

// ==================== クイズロジック ====================
let currentLevel = 1;
let currentQuestionIndex = 0;
let score = 100;
let activeQuestions = [];
let isWaiting = false;

// 画面の切り替え
function switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

function showHome() {
    switchScreen('home-screen');
}

// クイズ開始
function start4ChoiceGame(level) {
    currentLevel = level;
    currentQuestionIndex = 0;
    score = 100;
    isWaiting = false;

    const levelData = aotQuizData.find(d => d.level === level);
    if(!levelData) return;

    activeQuestions = [...levelData.questions];

    document.getElementById('level-display').innerText = `Lv.${level}`;
    updateScoreDisplay();
    switchScreen('quiz-screen');
    loadQuestion();
}

// 問題の読み込み
function loadQuestion() {
    if(currentQuestionIndex >= activeQuestions.length) {
        endGame();
        return;
    }

    const q = activeQuestions[currentQuestionIndex];
    document.getElementById('question-count').innerText = `${currentQuestionIndex + 1} / ${activeQuestions.length} 問`;
    document.getElementById('question-text-4c').innerText = q.question;

    const opts = ['A', 'B', 'C', 'D'];
    opts.forEach(opt => {
        const btn = document.getElementById(`btn-opt-${opt}`);
        btn.innerText = q.options[opt];
        // 見た目と無効化状態のリセット
        btn.style.backgroundColor = '';
        btn.style.color = '';
        btn.disabled = false;
    });
}

// 答え合わせ
function checkAnswer(selectedOpt) {
    if(isWaiting) return;
    isWaiting = true;

    const q = activeQuestions[currentQuestionIndex];
    const isCorrect = (selectedOpt === q.answer);

    const btn = document.getElementById(`btn-opt-${selectedOpt}`);
    
    // 他のボタンを無効化
    ['A', 'B', 'C', 'D'].forEach(opt => {
        document.getElementById(`btn-opt-${opt}`).disabled = true;
    });

    if(isCorrect) {
        showFeedback(true);
        btn.style.backgroundColor = '#2d4a35'; // 正解時は緑色を強調
        btn.style.color = '#fff';
        
        setTimeout(() => {
            currentQuestionIndex++;
            isWaiting = false;
            loadQuestion();
        }, 1000);
    } else {
        showFeedback(false);
        btn.style.backgroundColor = '#8b0000'; // 不正解時は赤色
        btn.style.color = '#fff';
        
        // 不正解の場合はペナルティ(-10pt)で次に進めない（正解するまで選ばせるか、即次へ行くか。今回はワンピース版に倣い減点のみで進行を止める）
        score = Math.max(0, score - 10);
        updateScoreDisplay();
        
        setTimeout(() => {
            isWaiting = false;
            // 不正解のボタンは暗くしたまま、他のボタンを押せるようにする
            ['A', 'B', 'C', 'D'].forEach(opt => {
                if(opt !== selectedOpt) {
                    document.getElementById(`btn-opt-${opt}`).disabled = false;
                }
            });
        }, 800);
    }
}

// スコア表示更新
function updateScoreDisplay() {
    document.getElementById('score-display').innerText = score;
}

// 正誤フィードバック表示
function showFeedback(isCorrect) {
    const fb = document.getElementById('feedback');
    fb.innerText = isCorrect ? '正解！' : '不正解...';
    fb.className = isCorrect ? 'correct show' : 'incorrect show';
    
    setTimeout(() => {
        fb.classList.remove('show');
    }, 800);
}

// クイズ終了と結果表示
function endGame() {
    document.getElementById('result-level').innerText = `レベル ${currentLevel} 帰還報告`;
    document.getElementById('final-score').innerText = score;

    let rank = '';
    let comment = '';
    if(score === 100) { 
        rank = '調査兵団 団長'; 
        comment = '人類の希望！完璧な知識だ！'; 
    } else if(score >= 80) { 
        rank = '調査兵団 班長'; 
        comment = '素晴らしい！壁外調査でも必ず生き残れるぞ！'; 
    } else if(score >= 60) { 
        rank = '精鋭兵士'; 
        comment = 'なかなかの実力だ。更なる高みを目指せ！'; 
    } else if(score >= 40) { 
        rank = '一人前の兵士'; 
        comment = 'まだまだ訓練が足りないな。出直してこい！'; 
    } else { 
        rank = '訓練兵'; 
        comment = '何も分かっていないようだ…巨人に食べられてしまうぞ！'; 
    }

    document.getElementById('final-rank').innerText = rank;
    document.getElementById('final-comment').innerText = comment;

    // 自己最高記録の保存 (ローカルストレージ)
    const key = `aot-record-lv${currentLevel}`;
    const prevRecord = localStorage.getItem(key);
    if(!prevRecord || score > parseInt(prevRecord)) {
        localStorage.setItem(key, score);
    }

    switchScreen('result-screen');
}

// 記録画面の表示
function showRecords() {
    for(let i=1; i<=10; i++) {
        const val = localStorage.getItem(`aot-record-lv${i}`);
        const td = document.getElementById(`rec-lv${i}`);
        if(td) {
            td.innerText = val !== null ? `${val} pt` : '-';
        }
    }
    switchScreen('record-screen');
}
</script>
