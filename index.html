<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANIME QUIZ PORTAL</title>
<style>
    :root {
        --primary-color: #ff4757;
        --secondary-color: #1e90ff;
        --bg-color: #f1f2f6;
        --text-color: #2f3542;
    }

    body {
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        background-color: var(--bg-color);
        /* アニメチックなドット背景 */
        background-image: radial-gradient(#ced6e0 2px, transparent 2px);
        background-size: 20px 20px;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: var(--text-color);
    }

    .container {
        background-color: white;
        border: 5px solid var(--text-color);
        border-radius: 15px;
        box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.2);
        padding: 40px;
        text-align: center;
        max-width: 800px;
        width: 90%;
    }

    h1 {
        font-size: 3em;
        color: white;
        background-color: var(--primary-color);
        padding: 10px 20px;
        border-radius: 10px;
        border: 4px solid var(--text-color);
        margin-top: 0;
        margin-bottom: 10px;
        text-shadow: 2px 2px 0px var(--text-color);
        transform: rotate(-2deg);
        display: inline-block;
    }

    p.subtitle {
        font-size: 1.2em;
        font-weight: bold;
        margin-bottom: 30px;
        color: #57606f;
    }

    /* ボタンを配置するグリッド */
    .button-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    /* 自動生成されるボタンのスタイル */
    .anime-btn {
        display: block;
        text-decoration: none;
        background-color: var(--secondary-color);
        color: white;
        font-size: 1.5em;
        font-weight: bold;
        padding: 20px 10px;
        border: 4px solid var(--text-color);
        border-radius: 10px;
        box-shadow: 4px 4px 0px var(--text-color);
        transition: all 0.2s ease;
        text-transform: uppercase;
    }

    .anime-btn:hover {
        background-color: #3742fa;
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0px var(--text-color);
    }

    .anime-btn:active {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0px var(--text-color);
    }

    .loading-text {
        font-size: 1.2em;
        font-weight: bold;
        color: var(--secondary-color);
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }
</style>
</head>
<body>

<div class="container">
    <h1>ANIME QUIZ PORTAL</h1>
    <p class="subtitle">挑戦したいアニメを選んでね！</p>
    
    <div id="anime-list" class="button-grid">
        <div class="loading-text">フォルダを検索中...</div>
    </div>
</div>

<script>
    // GitHubのリポジトリ情報（画像の情報をもとに設定）
    const githubOwner = 'katumumumu-hub';
    const githubRepo = 'yakyuu';
    
    // GitHub APIのエンドポイント（リポジトリの直下のコンテンツを取得）
    const apiUrl = `https://api.github.com/repos/${githubOwner}/${githubRepo}/contents`;

    async function loadAnimeFolders() {
        const container = document.getElementById('anime-list');
        
        try {
            // GitHub APIからデータを取得
            const response = await fetch(apiUrl);
            
            if (!response.ok) {
                throw new Error('APIの取得に失敗しました');
            }
            
            const data = await response.json();
            
            // 取得したデータの中から、「フォルダ(dir)」であり、隠しフォルダ（.で始まる）ではないものを抽出
            const folders = data.filter(item => item.type === 'dir' && !item.name.startsWith('.'));
            
            // 読み込み中テキストをクリア
            container.innerHTML = '';
            
            if (folders.length === 0) {
                container.innerHTML = '<p>クイズのフォルダが見つかりません。</p>';
                return;
            }

            // フォルダごとにボタンを生成
            folders.forEach(folder => {
                // フォルダ名を大文字にして表示用に（例: onepiece -> ONEPIECE）
                const displayName = folder.name.toUpperCase();
                
                const btn = document.createElement('a');
                btn.className = 'anime-btn';
                // 各フォルダの index.html へのリンクを設定
                btn.href = `./${folder.name}/index.html`;
                btn.innerText = displayName;
                
                container.appendChild(btn);
            });

        } catch (error) {
            console.error('エラー:', error);
            container.innerHTML = `
                <p style="color: red; font-weight: bold;">
                    フォルダの読み込みに失敗しました。<br>
                    <span style="font-size: 0.8em;">※GitHub APIの制限に引っかかったか、リポジトリが非公開設定の可能性があります。</span>
                </p>
                <a href="./onepiece/index.html" class="anime-btn" style="margin-top: 10px;">ONEPIECE (直接リンク)</a>
            `;
        }
    }

    // 画面読み込み時に実行
    window.onload = loadAnimeFolders;
</script>

</body>
</html>
