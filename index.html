<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ホーム画面 - 魔物の塔</title>
    <style>
        /* 全体の基本設定 */
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --border-color: #4a4a4a;
            --text-main: #f0f0f0;
            --text-sub: #a0a0a0;
            --accent-color: #c9a050;
            --slot-bg: #353535;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #000;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 430px;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* --- ヘッダー領域 --- */
        .header {
            background-color: var(--panel-bg);
            border-bottom: 2px solid var(--accent-color);
            padding: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 4px;
            font-size: 14px;
        }
        .header-box {
            border: 1px solid var(--border-color);
            background-color: #222;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 4px;
        }
        .player-name { grid-column: 1; grid-row: 1; }
        .current-floor { grid-column: 2; grid-row: 1 / span 2; flex-direction: column; }
        .gold-info { grid-column: 1; grid-row: 2; justify-content: flex-start; gap: 5px; color: #ffd700; font-weight: bold;}
        .orbs-info { grid-column: 3; grid-row: 1 / span 2; display: flex; flex-direction: column; gap: 2px; align-items: flex-end; padding-right: 10px;}
        .orb-row { display: flex; align-items: center; gap: 5px; font-size: 12px; }

        .orb-img { width: 16px; height: 16px; border-radius: 50%; object-fit: cover; }
        .gold-img { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; }

        /* --- メイン領域 --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .slot { background-color: var(--slot-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; position: relative; }
        .slot-title { font-size: 12px; color: var(--text-sub); margin-bottom: 5px; border-bottom: 1px solid var(--border-color); padding-bottom: 3px; }
        
        .slot.active .slot-inner { display: flex; justify-content: space-between; }
        .materials { font-size: 13px; line-height: 1.5; }
        .status-circle { width: 40px; height: 40px; border-radius: 50%; background-color: #222; border: 2px solid var(--accent-color); display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .slot-footer { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; color: var(--accent-color); }

        .slot.complete { background-color: rgba(201, 160, 80, 0.1); border-color: var(--accent-color); text-align: center; }
        .mixend-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
        .btn-result { background-color: var(--accent-color); color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; font-size: 14px; margin-top: 10px; width: 80%; cursor: pointer; }

        .slot.locked { background-color: #222; color: #555; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100px; border-style: dashed; }

        /* --- キャラクター領域 --- */
        .characters-area { display: flex; gap: 8px; padding: 10px; background-color: var(--panel-bg); border-top: 1px solid var(--border-color); }
        .char-box { flex: 1; aspect-ratio: 3 / 4; background-color: #444; border: 1px solid var(--border-color); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-sub); text-align: center; }

        /* --- ボトムナビゲーション --- */
        .bottom-nav {
            display: flex;
            background-color: #111;
            border-top: 1px solid #000;
            height: 60px;
        }
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #777;
            text-decoration: none; /* リンクの下線を消す */
            font-size: 11px;
            border-right: 1px solid #222;
            cursor: pointer;
        }
        .nav-btn:last-child { border-right: none; }
        .nav-btn.active { color: var(--accent-color); background-color: #222; }
        .nav-img { width: 28px; height: 28px; border-radius: 6px; object-fit: cover; margin-bottom: 2px; }
    </style>
</head>
<body>

<div id="game-container">
    
    <div class="header">
        <div class="header-box player-name">探索者</div>
        <div class="header-box current-floor">
            <span style="font-size: 10px; color: var(--text-sub);">現在の階層</span>
            <span style="font-weight: bold; font-size: 16px;">20階</span>
        </div>
        <div class="orbs-info">
            <div class="orb-row"><img src="red.jpg" alt="赤" class="orb-img"> 15</div>
            <div class="orb-row"><img src="White.jpg" alt="白" class="orb-img"> 10</div>
            <div class="orb-row"><img src="gray.jpg" alt="灰" class="orb-img"> 8</div>
        </div>
        <div class="header-box gold-info">
            <img src="gold.jpg" alt="G" class="gold-img"> 1000G
        </div>
    </div>

    <div class="main-content">
        <div class="slot active">
            <div class="slot-title">スロット 1</div>
            <div class="slot-inner">
                <div class="materials">
                    <div>合成中：</div>
                    <div>・蒼魔の鉄鉱</div>
                    <div>・万年氷の霜葉</div>
                    <div>・鎧蟹の重甲殻</div>
                </div>
                <div class="status-circle">稼働中</div>
            </div>
            <div class="slot-footer">
                <span>残り時間　00:45:00</span><span>成功率：60%</span>
            </div>
        </div>

        <div class="slot active">
            <div class="slot-title">スロット 2</div>
            <div class="slot-inner">
                <div class="materials">
                    <div>合成中：</div>
                    <div>・陽炎の赤砂</div>
                    <div>・妖精草の太根</div>
                    <div>・鋭角獣の白牙</div>
                </div>
                <div class="status-circle">稼働中</div>
            </div>
            <div class="slot-footer">
                <span>残り時間　02:15:00</span><span>成功率：85%</span>
            </div>
        </div>

        <div class="slot complete">
            <div class="slot-title" style="text-align: left;">スロット 3</div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 5px;">
                <img src="mixend.jpg" alt="合成完了アイコン" class="mixend-img">
                <span style="font-weight: bold; font-size: 16px;">合成完了</span>
            </div>
            <button class="btn-result">結果を見る</button>
        </div>

        <div class="slot locked">
            <div class="slot-title" style="width: 100%; text-align: left;">スロット 4</div>
            <div style="flex: 1; display: flex; align-items: center;">未開放</div>
        </div>
    </div>

    <div class="characters-area">
        <div class="char-box">キャラ 1<br>(火属性)</div>
        <div class="char-box">キャラ 2<br>(未設定)</div>
        <div class="char-box">キャラ 3<br>(未設定)</div>
        <div class="char-box">キャラ 4<br>(未設定)</div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-btn active">
            <img src="home.jpg" alt="ホーム" class="nav-img">
            <div>ホーム</div>
        </a>
        <a href="#" class="nav-btn">
            <img src="character.jpg" alt="仲間" class="nav-img">
            <div>仲間</div>
        </a>
        <a href="#" class="nav-btn">
            <img src="battle.jpg" alt="バトル" class="nav-img">
            <div>バトル</div>
        </a>
        <a href="mix.html" class="nav-btn">
            <img src="mix.jpg" alt="合成" class="nav-img">
            <div>合成</div>
        </a>
        <a href="shop.html" class="nav-btn">
            <img src="shop.jpg" alt="ショップ" class="nav-img">
            <div>ショップ</div>
        </a>
        <a href="item.html" class="nav-btn">
            <img src="item.jpg" alt="アイテム" class="nav-img">
            <div>アイテム</div>
        </a>
    </div>

</div>

</body>
</html>
