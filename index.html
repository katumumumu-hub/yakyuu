<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アイテム一覧 - 魔物の塔</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --border-color: #4a4a4a;
            --text-main: #f0f0f0;
            --text-sub: #a0a0a0;
            --accent-color: #c9a050; /* ゴールド */
            --highlight-color: #e67e22; /* 選択中 */
            --btn-use: #27ae60;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }

        body {
            background-color: #000;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 430px;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- ヘッダー --- */
        .header {
            background-color: var(--panel-bg);
            border-bottom: 2px solid var(--accent-color);
            padding: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px;
            font-size: 14px;
        }
        .header-box {
            border: 1px solid var(--border-color);
            background-color: #222;
            padding: 4px;
            text-align: center;
            border-radius: 4px;
        }
        .gold-info { color: #ffd700; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .gold-img { width: 14px; height: 14px; border-radius: 50%; }

        /* --- メインカテゴリタブ --- */
        .tabs {
            display: flex;
            background-color: #222;
            padding: 5px 10px 0;
            gap: 5px;
        }
        .tab {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            border-bottom: none;
        }
        .tab.active {
            background-color: var(--accent-color);
            color: #000;
            font-weight: bold;
            border-color: var(--accent-color);
        }

        /* --- サブカテゴリタブ（装備用） --- */
        .sub-tabs {
            display: none; /* 初期状態は非表示 */
            background-color: #1a1a1a;
            padding: 8px 15px;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .sub-tab {
            flex: 1;
            padding: 6px 0;
            text-align: center;
            background-color: #333;
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            font-size: 11px;
            cursor: pointer;
            border-radius: 15px; /* 丸みを帯びたデザインでメインタブと区別 */
        }
        .sub-tab.active {
            background-color: var(--highlight-color);
            color: #fff;
            font-weight: bold;
            border-color: var(--highlight-color);
        }

        /* --- アイテムグリッド --- */
        .item-list-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: min-content;
            gap: 8px;
            align-content: start;
            background-color: #111;
        }
        .item-slot {
            aspect-ratio: 1/1;
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .item-slot.selected {
            border-color: var(--highlight-color);
            box-shadow: inset 0 0 10px rgba(230, 126, 34, 0.5);
        }
        .item-icon {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }
        .item-count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 10px;
            background: rgba(0,0,0,0.7);
            padding: 0 4px;
            border-radius: 4px;
        }

        /* --- 詳細プレビューパネル --- */
        .preview-panel {
            height: 160px;
            background-color: var(--panel-bg);
            border-top: 2px solid var(--accent-color);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .preview-name {
            font-size: 16px;
            font-weight: bold;
            color: var(--accent-color);
        }
        .preview-rank {
            font-size: 12px;
            background: #444;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .preview-desc {
            font-size: 13px;
            color: var(--text-sub);
            line-height: 1.4;
            flex: 1;
            white-space: pre-wrap; /* 改行を反映 */
        }
        .preview-actions {
            display: flex;
            justify-content: flex-end;
        }
        .btn-use {
            background-color: var(--btn-use);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 4px;
            font-weight: bold;
            display: none; /* 初期は非表示 */
        }

        /* --- ボトムナビ --- */
        .bottom-nav {
            display: flex;
            background-color: #111;
            height: 60px;
            border-top: 1px solid #000;
        }
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 10px;
            text-decoration: none;
        }
        .nav-btn.active { color: var(--accent-color); }
        .nav-img { width: 24px; height: 24px; margin-bottom: 2px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div class="header-box">探索者</div>
        <div class="header-box">20階</div>
        <div class="header-box gold-info">
            <img src="gold.jpg" class="gold-img"> 1250G
        </div>
    </div>

    <div class="tabs main-tabs">
        <div class="tab active" onclick="switchCategory('normal', this)">通常</div>
        <div class="tab" onclick="switchCategory('helper', this)">手助け</div>
        <div class="tab" onclick="switchCategory('material', this)">素材</div>
        <div class="tab" onclick="switchCategory('equipment', this)">装備</div>
    </div>

    <div id="sub-tabs" class="sub-tabs">
        <div class="sub-tab active" onclick="switchEquipType('weapon', this)">武器</div>
        <div class="sub-tab" onclick="switchEquipType('armor', this)">防具</div>
        <div class="sub-tab" onclick="switchEquipType('accessory', this)">アクセ</div>
    </div>

    <div id="item-list" class="item-list-area">
        </div>

    <div id="preview" class="preview-panel">
        <div class="preview-header">
            <div id="p-name" class="preview-name">アイテムを選択してください</div>
            <div id="p-rank" class="preview-rank">--</div>
        </div>
        <div id="p-desc" class="preview-desc">所持品の詳細がここに表示されます。</div>
        <div class="preview-actions">
            <button id="use-button" class="btn-use">使用する</button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-btn"><img src="home.jpg" class="nav-img">ホーム</a>
        <a href="#" class="nav-btn"><img src="character.jpg" class="nav-img">仲間</a>
        <a href="#" class="nav-btn"><img src="battle.jpg" class="nav-img">バトル</a>
        <a href="#" class="nav-btn"><img src="mix.jpg" class="nav-img">合成</a>
        <a href="#" class="nav-btn"><img src="shop.jpg" class="nav-img">ショップ</a>
        <a href="#" class="nav-btn active"><img src="item.jpg" class="nav-img">アイテム</a>
    </div>
</div>

<script>
    // --- データ定義 ---
    const itemData = {
        normal: [
            { id: 101, name: "HPポーションS", rank: "D", desc: "体力を100回復する。\n合成でのみ入手可能な基本薬。", count: 5, type: "use" },
            { id: 102, name: "MPポーションS", rank: "D", desc: "魔力を50回復する。\n合成でのみ入手可能な基本薬。", count: 3, type: "use" },
            { id: 103, name: "力の雫", rank: "B", desc: "攻撃力が永続的に1上昇する貴重な強化アイテム。", count: 1, type: "use" }
        ],
        helper: [
            { id: 201, name: "絶対成功薬", rank: "S", desc: "合成確率を100%にする。\nショップでも購入可能な貴重な薬。", count: 3, type: "view" },
            { id: 202, name: "時短砂時計", rank: "C", desc: "合成時間を30分短縮する。", count: 2, type: "view" }
        ],
        material: [
            { id: 1, name: "蒼魔の鉄鉱", rank: "C", desc: "微かな魔力を帯びた硬い鉄鉱石。\n武器の鍛造に適している。", count: 12, type: "view", icon: "gray.jpg" },
            { id: 2, name: "月光石の欠片", rank: "B", desc: "夜になるとほのかに発光する、魔法の媒介に優れた石。", count: 4, type: "view", icon: "White.jpg" },
            { id: 3, name: "陽炎の赤砂", rank: "C", desc: "常に熱を帯びており、火属性の合成に重宝される。", count: 8, type: "view", icon: "red.jpg" },
            { id: 8, name: "万年氷の霜葉", rank: "B", desc: "決して溶けることのない、冷気を放つ氷の葉。", count: 2, type: "view", icon: "White.jpg" }
        ],
        // 追加: 装備データ群 (すべて閲覧のみ)
        weapon: [
            { id: 301, name: "見習いの短剣", rank: "F", desc: "【火属性】\nステータス: 攻撃+10\n扱いやすい基本的な短剣。", count: 1, type: "view" },
            { id: 302, name: "重装兵の大剣", rank: "C", desc: "【無属性】\nステータス: 攻撃+45 俊敏性-5\n重く威力の高い剣。", count: 1, type: "view" },
            { id: 303, name: "雷鳴の杖", rank: "A", desc: "【雷属性】\nステータス: 魔法攻撃+120\n雷晶を埋め込んだ強力な魔法の杖。", count: 1, type: "view" }
        ],
        armor: [
            { id: 401, name: "冒険者の胴着", rank: "F", desc: "【無属性】\nステータス: 防御+8\n防御部位: 胴\n動きやすい軽装の鎧。", count: 1, type: "view" },
            { id: 402, name: "重甲殻の兜", rank: "C", desc: "【水属性】\nステータス: 防御+25 魔法防御+10\n防御部位: 頭\n鎧蟹の素材から作られた硬い兜。", count: 1, type: "view" }
        ],
        accessory: [
            { id: 501, name: "命の指輪", rank: "D", desc: "【無属性】\nステータス: HP+50\n装備部位: 指\n僅かに生命力を高める指輪。", count: 1, type: "view" },
            { id: 502, name: "疾風の耳飾り", rank: "B", desc: "【風属性】\nステータス: 俊敏性+20 運+5\n装備部位: 耳\n風の魔力を帯びた耳飾り。", count: 1, type: "view" }
        ]
    };

    let currentCategory = 'normal'; // 現在のメインタブ状態
    let currentEquipType = 'weapon'; // 現在の装備サブタブ状態

    // --- 関数定義 ---

    // メインカテゴリ切り替え
    function switchCategory(category, element) {
        currentCategory = category;
        
        // タブの見た目更新
        document.querySelectorAll('.main-tabs .tab').forEach(t => t.classList.remove('active'));
        if (element) element.classList.add('active');

        const subTabsEl = document.getElementById('sub-tabs');
        
        // 装備タブが選ばれたらサブタブを表示し、現在の装備タイプを描画
        if (category === 'equipment') {
            subTabsEl.style.display = 'flex';
            renderItems(currentEquipType);
        } else {
            // それ以外はサブタブを隠して、選ばれたカテゴリを描画
            subTabsEl.style.display = 'none';
            renderItems(category);
        }
        
        resetPreview();
    }

    // 装備サブカテゴリ切り替え
    function switchEquipType(type, element) {
        currentEquipType = type;

        // サブタブの見た目更新
        document.querySelectorAll('.sub-tabs .sub-tab').forEach(t => t.classList.remove('active'));
        if (element) element.classList.add('active');

        renderItems(type);
        resetPreview();
    }

    // アイテムリスト描画
    function renderItems(dataKey) {
        const listArea = document.getElementById('item-list');
        listArea.innerHTML = '';

        const items = itemData[dataKey];

        items.forEach(item => {
            const slot = document.createElement('div');
            slot.className = 'item-slot';
            slot.onclick = () => selectItem(item, slot);

            const iconSrc = item.icon || 'item.jpg';
            slot.innerHTML = `
                <img src="${iconSrc}" class="item-icon">
                <div class="item-count">${item.count}</div>
            `;
            listArea.appendChild(slot);
        });

        // 空きスロット
        for (let i = items.length; i < 20; i++) {
            const empty = document.createElement('div');
            empty.className = 'item-slot';
            empty.style.opacity = "0.3";
            listArea.appendChild(empty);
        }
    }

    // アイテム選択
    function selectItem(item, element) {
        document.querySelectorAll('.item-slot').forEach(s => s.classList.remove('selected'));
        element.classList.add('selected');

        document.getElementById('p-name').innerText = item.name;
        document.getElementById('p-rank').innerText = "Rank " + item.rank;
        document.getElementById('p-desc').innerText = item.desc;

        const useBtn = document.getElementById('use-button');
        if (item.type === 'use') {
            useBtn.style.display = 'block';
        } else {
            useBtn.style.display = 'none';
        }
    }

    // プレビューリセット
    function resetPreview() {
        document.getElementById('p-name').innerText = "アイテムを選択してください";
        document.getElementById('p-rank').innerText = "--";
        document.getElementById('p-desc').innerText = "所持品の詳細がここに表示されます。";
        document.getElementById('use-button').style.display = 'none';
    }

    // 初期起動
    window.onload = () => {
        renderItems('normal');
    };

</script>

</body>
</html>
