<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モンスター育成ファクトリー</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #e74c3c; --bg: #ecf0f1; --text: #2c3e50; --white: #ffffff; --nav: #2980b9; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .game-container { width: 100%; max-width: 800px; background: var(--white); border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto auto; }
        .header { grid-column: 1 / -1; background: var(--primary); color: var(--white); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-bar { grid-column: 1 / -1; display: flex; background: var(--secondary); }
        .nav-btn { flex: 1; padding: 12px 0; background: transparent; color: var(--white); border: none; border-right: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.2s; }
        .nav-btn:hover { background: var(--nav); }
        .nav-btn:last-child { border-right: none; }
        .panel { padding: 20px; }
        .monster-display { text-align: center; border-bottom: 2px solid var(--bg); padding-bottom: 20px; margin-bottom: 20px; }
        .monster-image { margin: 10px auto; background: transparent; border-radius: 50%; width: 150px; height: 150px; display: flex; justify-content: center; align-items: center; }
        .status-box { background: #f8f9fa; padding: 15px; border-radius: 8px; font-weight: bold; }
        .status-row { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px dashed #ccc; padding-bottom: 3px; }
        .actions-panel { border-left: 2px solid var(--bg); }
        h3 { margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 5px; }
        .btn { display: block; width: 100%; padding: 10px; margin-bottom: 10px; background: var(--primary); color: var(--white); border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: var(--secondary); }
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: var(--white); width: 90%; max-width: 600px; max-height: 80vh; border-radius: 10px; padding: 20px; position: relative; overflow-y: auto; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: bold; }
        .close-btn:hover { background: #c0392b; }
        .list-item { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .list-item img { width: 50px; height: 50px; object-fit: contain; margin-right: 15px; }
        .list-info { flex: 1; }
        .list-info h4 { margin: 0 0 5px 0; }
        .list-info p { margin: 0; font-size: 12px; color: #666; }
        .buy-btn, .use-btn { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .buy-btn:hover, .use-btn:hover { background: #2ecc71; }
        .buy-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .pokedex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .pokedex-card { border: 1px solid #ccc; border-radius: 8px; padding: 10px; text-align: center; background: #f9f9f9; }
        .pokedex-card img { width: 80px; height: 80px; object-fit: contain; }
        .pokedex-card.locked img { filter: brightness(0); opacity: 0.3; }
        .log-area { background: #333; color: #0f0; padding: 10px; height: 200px; overflow-y: auto; font-family: monospace; border-radius: 5px; }
        .log-entry { border-bottom: 1px dotted #555; padding: 3px 0; }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; z-index: 3000; }
    </style>
</head>
<body>

<div id="loading-screen">データを読み込み中...</div>

<div class="game-container" id="game-ui" style="display: none;">
    <div class="header">
        <h2 style="margin:0;">モンスター育成ファクトリー</h2>
        <div>所持金: <span id="ui-money">0</span> G | 残り行動: <strong id="ui-turns" style="color:var(--accent); font-size: 1.2em;">0</strong> 回</div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" onclick="openModal('modal-inventory')">👜 持ち物</button>
        <button class="nav-btn" onclick="openModal('modal-shop')">🛒 ショップ</button>
        <button class="nav-btn" onclick="openModal('modal-pokedex')">📖 図鑑</button>
        <button class="nav-btn" onclick="openModal('modal-settings')">⚙️ 設定</button>
    </div>

    <div class="panel">
        <div class="monster-display" id="monster-display-area">
            <h3 id="ui-monster-name">-</h3>
            <div class="monster-image" id="ui-monster-img"></div>
            <div id="ui-condition" style="font-weight: bold; color: var(--accent); margin-bottom: 5px;">-</div>
            <div style="font-weight: bold; color: #8e44ad; margin-bottom: 10px;">疲労度: <span id="ui-fatigue">0</span> / 100</div>
        </div>
        <div class="status-box">
            <div class="status-row"><span>HP:</span> <span id="ui-hp">0</span></div>
            <div class="status-row"><span>攻撃 (ATK):</span> <span id="ui-atk">0</span></div>
            <div class="status-row"><span>魔法 (MAG):</span> <span id="ui-mag">0</span></div>
            <div class="status-row"><span>防御 (DEF):</span> <span id="ui-def">0</span></div>
            <div class="status-row"><span>俊敏 (AGI):</span> <span id="ui-agi">0</span></div>
            <div class="status-row"><span>運 (LUK):</span> <span id="ui-luk">0</span></div>
        </div>
    </div>

    <div class="panel actions-panel">
        <h3>行動 (Actions)</h3>
        <div id="actions-container"></div>
    </div>
</div>

<div id="modal-inventory" class="modal"><div class="modal-content"><button class="close-btn" onclick="closeModal('modal-inventory')">X</button><h2 style="margin-top:0; border-bottom: 2px solid var(--primary);">持ち物</h2><div id="inventory-list"></div></div></div>
<div id="modal-shop" class="modal"><div class="modal-content"><button class="close-btn" onclick="closeModal('modal-shop')">X</button><h2 style="margin-top:0; border-bottom: 2px solid var(--primary);">ショップ (所持金: <span id="shop-money">0</span> G)</h2><div id="shop-list"></div></div></div>
<div id="modal-pokedex" class="modal"><div class="modal-content" style="max-width: 800px;"><button class="close-btn" onclick="closeModal('modal-pokedex')">X</button><h2 style="margin-top:0; border-bottom: 2px solid var(--primary);">モンスター図鑑</h2><div class="pokedex-grid" id="pokedex-grid"></div></div></div>
<div id="modal-settings" class="modal"><div class="modal-content"><button class="close-btn" onclick="closeModal('modal-settings')">X</button><h2 style="margin-top:0; border-bottom: 2px solid var(--primary);">設定・システム</h2><button class="btn" style="background:#e67e22;" onclick="saveGame()">💾 セーブする (ブラウザに保存)</button><button class="btn" style="background:#c0392b; margin-bottom: 20px;" onclick="resetSave()">🗑️ セーブデータを消去して最初から</button><h3>行動ログ</h3><div class="log-area" id="system-log"></div></div></div>

<script>
    let DB = {};
    let UserData = {};
    let GameLogs = []; 
    // セーブデータをv3に更新して古いエラーを防ぐ
    const SAVE_KEY = "monster_factory_save_v3"; 

    async function loadGameData() {
        try {
            const [imagesRes, monstersRes, itemsRes, actionsRes, conditionsRes, eventsRes, userDataRes] = await Promise.all([
                fetch('Images.json'), fetch('Monsters.json'), fetch('Items.json'), 
                fetch('Actions.json'), fetch('Conditions.json'), fetch('Events.json'), fetch('UserData.json')
            ]);

            const rawImages = await imagesRes.json();
            const rawConditions = await conditionsRes.json();
            const rawEvents = await eventsRes.json();
            
            DB.Monsters = await monstersRes.json();
            DB.Items = await itemsRes.json();
            DB.Actions = await actionsRes.json();
            let defaultUserData = await userDataRes.json();

            const savedData = localStorage.getItem(SAVE_KEY);
            if (savedData) {
                UserData = JSON.parse(savedData);
                addLog("前回のセーブデータをロードしました。");
            } else {
                UserData = defaultUserData;
                addLog("初期データでゲームを開始しました。");
            }

            DB.Images = {};
            rawImages.forEach(img => { DB.Images[img.id] = img.path; });

            DB.Conditions = {};
            rawConditions.forEach(cond => {
                DB.Conditions[cond.id] = {
                    name: cond.name,
                    mult: {
                        gain: cond.effect_multiplier ? cond.effect_multiplier.training_gain : 1.0,
                        fatigue_rate: cond.effect_multiplier ? cond.effect_multiplier.fatigue_rate : 1.0
                    }
                };
            });

            DB.Events = rawEvents.map(e => ({
                id: e.id, name: e.name, trigger: e.trigger, prob: e.probability,
                effects: e.effects || {}, force_condition: e.force_condition, reward: e.rewards ? e.rewards.item_id : null
            }));

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'grid';
            initGame();

        } catch (error) {
            console.error(error);
            document.getElementById('loading-screen').innerText = "エラー：JSONファイルの読み込みに失敗しました。";
        }
    }

    function saveGame() {
        localStorage.setItem(SAVE_KEY, JSON.stringify(UserData));
        alert("セーブしました！"); addLog("手動セーブを実行しました。");
    }
    function resetSave() {
        if(confirm("セーブデータを消去しますか？")) { localStorage.removeItem(SAVE_KEY); location.reload(); }
    }

    function addLog(msg) {
        GameLogs.unshift(`> ${msg}`);
        if(GameLogs.length > 50) GameLogs.pop();
        const logArea = document.getElementById('system-log');
        logArea.innerHTML = '';
        GameLogs.forEach(m => { const div = document.createElement('div'); div.className = 'log-entry'; div.innerText = m; logArea.appendChild(div); });
    }

    function openModal(modalId) {
        if(modalId === 'modal-shop') renderShop();
        if(modalId === 'modal-inventory') renderInventory();
        if(modalId === 'modal-pokedex') renderPokedex();
        document.getElementById(modalId).style.display = 'flex';
    }
    function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }

    function updateMainUI() {
        const breed = UserData.active_breeding;
        document.getElementById('ui-money').innerText = UserData.player_status.money;

        const isFinished = !breed.is_breeding;
        document.querySelectorAll('#actions-container .btn').forEach(btn => { btn.disabled = isFinished; });

        if (isFinished) {
            document.getElementById('ui-monster-name').innerText = "育成終了（新しいタネを育てよう！）";
            document.getElementById('ui-turns').innerText = "0";
            return;
        }

        const params = breed.current_parameters;
        document.getElementById('ui-turns').innerText = breed.remaining_actions;

        const monster = DB.Monsters.find(m => m.id === breed.current_seed_id);
        document.getElementById('ui-monster-name').innerText = monster.name;
        document.getElementById('ui-monster-img').innerHTML = `<img src="${DB.Images[monster.image_id]}" alt="${monster.name}" style="width: 100%; height: 100%; object-fit: contain;">`;
        
        const cond = DB.Conditions[breed.current_condition_id];
        document.getElementById('ui-condition').innerText = `コンディション: ${cond.name}`;
        
        document.getElementById('ui-fatigue').innerText = Math.floor(breed.fatigue);
        document.getElementById('ui-hp').innerText = Math.floor(params.hp);
        document.getElementById('ui-atk').innerText = Math.floor(params.atk);
        document.getElementById('ui-mag').innerText = Math.floor(params.mag);
        document.getElementById('ui-def').innerText = Math.floor(params.def);
        document.getElementById('ui-agi').innerText = Math.floor(params.agi);
        // FITをLUKに変更
        document.getElementById('ui-luk').innerText = Math.floor(params.luk); 
    }

    function renderShop() {
        document.getElementById('shop-money').innerText = UserData.player_status.money;
        let html = '';
        DB.Items.forEach(item => {
            const canBuy = UserData.player_status.money >= item.price;
            html += `<div class="list-item"><div class="list-info"><h4>${item.name} (${item.price} G)</h4><p>${item.description}</p></div><button class="buy-btn" ${canBuy ? '' : 'disabled'} onclick="buyItem('${item.id}', 'item', ${item.price})">購入</button></div>`;
        });
        DB.Monsters.filter(m => m.type === 'seed').forEach(seed => {
            const canBuy = UserData.player_status.money >= seed.price;
            html += `<div class="list-item"><img src="${DB.Images[seed.image_id]}"><div class="list-info"><h4>${seed.name} (${seed.price} G)</h4><p>${seed.description}</p></div><button class="buy-btn" ${canBuy ? '' : 'disabled'} onclick="buyItem('${seed.id}', 'seed', ${seed.price})">購入</button></div>`;
        });
        document.getElementById('shop-list').innerHTML = html;
    }

    function buyItem(id, type, price) {
        if (UserData.player_status.money < price) return;
        UserData.player_status.money -= price;
        if (type === 'item') {
            let inv = UserData.inventory.find(i => i.item_id === id);
            if (inv) inv.quantity++; else UserData.inventory.push({ item_id: id, quantity: 1 });
            addLog(`ショップでアイテムを購入しました。`);
        } else if (type === 'seed') {
            let inv = UserData.seed_inventory.find(s => s.monster_id === id);
            if (inv) inv.quantity++; else UserData.seed_inventory.push({ monster_id: id, quantity: 1 });
            addLog(`ショップでタネを購入しました。`);
        }
        renderShop(); updateMainUI();
    }

    function renderInventory() {
        let html = `<h3>所持アイテム</h3>`;
        UserData.inventory.forEach(inv => {
            if (inv.quantity > 0) {
                const item = DB.Items.find(i => i.id === inv.item_id);
                const canUse = UserData.active_breeding.is_breeding;
                html += `<div class="list-item"><div class="list-info"><h4>${item.name} (所持: ${inv.quantity})</h4><p>${item.description}</p></div><button class="use-btn" ${canUse ? '' : 'disabled'} onclick="useItem('${item.id}')">使う</button></div>`;
            }
        });
        html += `<h3 style="margin-top:20px;">所持しているタネ</h3>`;
        UserData.seed_inventory.forEach(inv => {
            if (inv.quantity > 0) {
                const seed = DB.Monsters.find(m => m.id === inv.monster_id);
                const canBreed = !UserData.active_breeding.is_breeding;
                html += `<div class="list-item"><img src="${DB.Images[seed.image_id]}"><div class="list-info"><h4>${seed.name} (所持: ${inv.quantity})</h4></div><button class="use-btn" style="background:#e67e22;" ${canBreed ? '' : 'disabled'} onclick="startBreeding('${seed.id}')">育てる</button></div>`;
            }
        });
        document.getElementById('inventory-list').innerHTML = html;
    }

    function useItem(itemId) {
        if (!UserData.active_breeding.is_breeding) return;
        let invItem = UserData.inventory.find(i => i.item_id === itemId);
        if (!invItem || invItem.quantity <= 0) return;

        const item = DB.Items.find(i => i.id === itemId);
        invItem.quantity--;
        addLog(`💊 アイテム使用: 【${item.name}】`);

        const breed = UserData.active_breeding;
        switch (item.effect_type) {
            case "training_boost": case "rest_boost": breed.active_buffs = [{ item_id: itemId, turns_left: 1 }]; break;
            case "action_increase": breed.remaining_actions += item.effect_value; break;
            case "heal_fatigue": breed.fatigue = Math.max(0, breed.fatigue - item.effect_value); break;
            case "heal_condition": breed.current_condition_id = item.effect_value; break;
        }
        renderInventory(); updateMainUI();
    }

    function startBreeding(seedId) {
        let invSeed = UserData.seed_inventory.find(s => s.monster_id === seedId);
        if (!invSeed || invSeed.quantity <= 0) return;
        invSeed.quantity--;
        
        UserData.active_breeding = {
            is_breeding: true,
            current_seed_id: seedId,
            remaining_actions: 90,
            current_condition_id: "cond_001",
            fatigue: 0,
            // lukに変更
            current_parameters: { hp: 100, atk: 10, mag: 10, def: 10, agi: 10, luk: 10 },
            active_buffs: []
        };
        if(!UserData.monster_book.includes(seedId)) UserData.monster_book.push(seedId);
        addLog(`🌱 新しい育成を開始しました！`);
        closeModal('modal-inventory'); updateMainUI();
    }

    function renderPokedex() {
        let html = '';
        DB.Monsters.forEach(m => {
            const isUnlocked = UserData.monster_book.includes(m.id);
            const cardClass = isUnlocked ? 'pokedex-card' : 'pokedex-card locked';
            html += `<div class="${cardClass}"><img src="${DB.Images[m.image_id]}"><h4>${isUnlocked ? m.name : '???'}</h4></div>`;
        });
        document.getElementById('pokedex-grid').innerHTML = html;
    }

    function performAction(actionId) {
        const breed = UserData.active_breeding;
        if (!breed.is_breeding || breed.remaining_actions <= 0) return;

        const action = DB.Actions.find(a => a.id === actionId);
        const cond = DB.Conditions[breed.current_condition_id];
        addLog(`行動: 【${action.name}】`);

        let hpChange = action.effects.hp || 0;
        let atkChange = action.effects.atk || 0;
        let magChange = action.effects.mag || 0;
        let defChange = action.effects.def || 0;
        let agiChange = action.effects.agi || 0;
        let lukChange = action.effects.luk || 0; // fitからlukに変更
        let fatigueChange = action.effects.fatigue || 0;

        if (fatigueChange > 0) fatigueChange *= cond.mult.fatigue_rate;
        if (atkChange > 0) atkChange *= cond.mult.gain;
        if (magChange > 0) magChange *= cond.mult.gain;
        if (defChange > 0) defChange *= cond.mult.gain;
        if (agiChange > 0) agiChange *= cond.mult.gain;
        if (lukChange > 0) lukChange *= cond.mult.gain;

        let activeBuff = breed.active_buffs.find(b => b.turns_left > 0);
        if (activeBuff) {
            const buffItem = DB.Items.find(i => i.id === activeBuff.item_id);
            if (action.type === 'training' && buffItem.effect_type === 'training_boost') {
                atkChange *= buffItem.effect_value; magChange *= buffItem.effect_value;
                defChange *= buffItem.effect_value; agiChange *= buffItem.effect_value; lukChange *= buffItem.effect_value;
            } else if (action.type === 'rest' && buffItem.effect_type === 'rest_boost') {
                fatigueChange *= buffItem.effect_value;
            }
            activeBuff.turns_left--;
            if (activeBuff.turns_left <= 0) breed.active_buffs = [];
        }

        breed.current_parameters.hp += hpChange;
        breed.current_parameters.atk += atkChange;
        breed.current_parameters.mag += magChange;
        breed.current_parameters.def += defChange;
        breed.current_parameters.agi += agiChange;
        breed.current_parameters.luk += lukChange;
        breed.fatigue = Math.max(0, breed.fatigue + fatigueChange);

        if (action.effects.force_condition) breed.current_condition_id = action.effects.force_condition;

        if (breed.fatigue >= 100 && breed.current_condition_id !== "cond_005") {
            breed.fatigue = 100;
            breed.current_condition_id = "cond_005";
            addLog("⚠️ 疲労が限界に達し、「ケガ」をしてしまった！");
        }

        DB.Events.forEach(evt => {
            if (evt.trigger === action.type && Math.random() < evt.prob) {
                addLog(`✨ イベント発生: ${evt.name}`);
                if (evt.effects) {
                    breed.current_parameters.hp += (evt.effects.hp || 0);
                    breed.current_parameters.atk += (evt.effects.atk || 0);
                    breed.current_parameters.mag += (evt.effects.mag || 0);
                    breed.current_parameters.def += (evt.effects.def || 0);
                    breed.current_parameters.agi += (evt.effects.agi || 0);
                    breed.current_parameters.luk += (evt.effects.luk || 0); // lukに変更
                }
                if (evt.force_condition) breed.current_condition_id = evt.force_condition;
                if (evt.reward) {
                    let inv = UserData.inventory.find(i => i.item_id === evt.reward);
                    if (inv) inv.quantity++; else UserData.inventory.push({ item_id: evt.reward, quantity: 1 });
                }
            }
        });

        breed.remaining_actions--;
        if (breed.remaining_actions <= 0) checkEvolution();

        updateMainUI();
    }

    function checkEvolution() {
        const breed = UserData.active_breeding;
        const p = breed.current_parameters;
        addLog("🌟 進化の時です...");

        let evolvedId = breed.current_seed_id;
        for (let i = DB.Monsters.length - 1; i >= 0; i--) {
            const mon = DB.Monsters[i];
            if (mon.type === 'evolved' && mon.evolution_conditions.base_seed_ids.includes(breed.current_seed_id)) {
                const c = mon.evolution_conditions;
                // luk判定に変更
                if (p.hp >= (c.min_hp||0) && p.atk >= (c.min_atk||0) && p.mag >= (c.min_mag||0) && p.def >= (c.min_def||0) && p.agi >= (c.min_agi||0) && p.luk >= (c.min_luk||0)) {
                    evolvedId = mon.id; break;
                }
            }
        }

        const newMonster = DB.Monsters.find(m => m.id === evolvedId);
        breed.current_seed_id = evolvedId;
        breed.is_breeding = false;

        if (newMonster.type === 'evolved') {
            addLog(`🎉 【${newMonster.name}】に進化！ (報酬: 3000G)`);
            UserData.player_status.money += 3000;
        } else {
            addLog(`そのままの姿で育成を終えました。`);
        }

        if(!UserData.monster_book.includes(evolvedId)) UserData.monster_book.push(evolvedId);
        localStorage.setItem(SAVE_KEY, JSON.stringify(UserData));
    }

    function initGame() {
        const actContainer = document.getElementById('actions-container');
        DB.Actions.forEach(act => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerText = act.name;
            btn.onclick = () => performAction(act.id);
            actContainer.appendChild(btn);
        });
        updateMainUI();
    }

    window.onload = loadGameData;
</script>

</body>
</html>
