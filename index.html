<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONE PIECE クイズ</title>
<style>
    :root {
        --bg-color: #d2b48c;
        --poster-bg: #fdf5e6;
        --border-color: #5a3a22;
        --text-color: #332211;
        --btn-color: #8b0000;
        --btn-hover: #a52a2a;
    }
    
    body {
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        background-color: var(--bg-color);
        background-image: linear-gradient(45deg, rgba(0,0,0,0.05) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.05) 75%, rgba(0,0,0,0.05)), 
                          linear-gradient(45deg, rgba(0,0,0,0.05) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.05) 75%, rgba(0,0,0,0.05));
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: var(--text-color);
    }

    #app {
        width: 100%;
        max-width: 600px;
        background-color: var(--poster-bg);
        border: 8px solid var(--border-color);
        border-radius: 4px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        padding: 20px;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
    }

    .screen {
        display: none;
        flex-direction: column;
        align-items: center;
    }

    .screen.active {
        display: flex;
    }

    h1 {
        font-family: serif;
        font-size: 2.5em;
        text-align: center;
        margin: 0 0 20px 0;
        border-bottom: 3px double var(--border-color);
        padding-bottom: 10px;
        letter-spacing: 2px;
    }

    h2 {
        font-size: 1.5em;
        margin-bottom: 15px;
        text-align: center;
    }

    button {
        background-color: var(--btn-color);
        color: white;
        border: 2px solid #330000;
        padding: 12px 20px;
        font-size: 1.1em;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
        margin: 10px;
        width: 80%;
        max-width: 300px;
        transition: background-color 0.2s, transform 0.1s;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }

    button:hover {
        background-color: var(--btn-hover);
    }

    button:active {
        transform: scale(0.98);
        box-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }

    button:disabled {
        background-color: #888;
        cursor: not-allowed;
        border-color: #555;
    }

    /* クイズ画面用スタイル */
    .header-info {
        width: 100%;
        display: flex;
        justify-content: space-between;
        font-size: 1.2em;
        font-weight: bold;
        margin-bottom: 15px;
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 10px;
    }

    .pt-display {
        color: #d32f2f;
    }

    .name-hint-box {
        font-size: 2em;
        letter-spacing: 5px;
        margin: 20px 0;
        padding: 15px;
        background-color: rgba(255,255,255,0.5);
        border: 2px dashed var(--border-color);
        border-radius: 5px;
        text-align: center;
        width: 100%;
        box-sizing: border-box;
    }

    .hints-container {
        width: 100%;
        min-height: 180px;
        margin-bottom: 15px;
    }

    .hint-item {
        background-color: #f0e6d2;
        border-left: 5px solid var(--border-color);
        padding: 10px;
        margin-bottom: 8px;
        font-size: 1.1em;
        animation: fadeIn 0.3s ease-in-out;
    }

    input[type="text"] {
        width: 90%;
        padding: 12px;
        font-size: 1.2em;
        border: 2px solid var(--border-color);
        border-radius: 5px;
        margin-bottom: 15px;
        text-align: center;
        background-color: #fff;
    }

    .action-buttons {
        display: flex;
        justify-content: center;
        width: 100%;
        gap: 10px;
    }

    .action-buttons button {
        width: 45%;
        margin: 0;
    }

    .btn-skip {
        background-color: #4a4a4a !important;
    }
    .btn-skip:hover {
        background-color: #6a6a6a !important;
    }

    /* 結果画面用スタイル */
    .result-score {
        font-size: 3em;
        color: #d32f2f;
        font-weight: bold;
        margin: 20px 0;
    }

    .result-rank {
        font-size: 2em;
        font-weight: bold;
        margin: 10px 0;
    }

    .result-comment {
        font-size: 1.2em;
        margin-bottom: 30px;
        text-align: center;
        padding: 0 20px;
    }

    /* 記録画面用スタイル */
    .record-table {
        width: 80%;
        border-collapse: collapse;
        margin-bottom: 30px;
    }
    .record-table th, .record-table td {
        border: 1px solid var(--border-color);
        padding: 10px;
        text-align: center;
        font-size: 1.2em;
    }
    .record-table th {
        background-color: rgba(90, 58, 34, 0.2);
    }

    /* フィードバックアニメーション */
    #feedback {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        font-size: 4em;
        font-weight: bold;
        z-index: 10;
        text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
        pointer-events: none;
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #feedback.show {
        transform: translate(-50%, -50%) scale(1);
    }
    .correct { color: #4CAF50; }
    .incorrect { color: #F44336; }
    .skipped { color: #FF9800; }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

        <div style="height: 20px;"></div>

        <div class="action-buttons">

        <div id="feedback"></div>

    <div id="result-screen" class="screen">

    <div id="record-screen" class="screen">

</div>

      {"name": "トマトギャング", "name_hint": "〇〇〇〇⚪︎〇〇", "hints": ["扉絵や群衆の中など（SBS）", "「パンダマン待て!!」", "頭がトマト、銃を持っている、借金取りのスーツ", "「金返せ!!」", "食べていない"]},

      {"name": "キャプテン・マッキンリー", "name_hint": "〇⚪︎〇〇〇⚪︎〇⚪︎〇〇〇〇", "hints": ["空島編で登場", "「不法入国です」", "ホワイトベレー帽、ふっくらした体型、這いつくばって移動する", "「神の裁きを受けなさい!!」", "食べていない（ホワイトベレー部隊隊長）"]},
      {"name": "ミカヅキ", "name_hint": "〇〇〇〇", "hints": ["ウォーターセブン編で登場", "「俺は大カブト海賊団の船長だ!!」", "三日月の兜、派手なマント", "「ツケにしておけ!!」", "食べていない（ガレーラカンパニーに借金を踏み倒そうとした）"]},
      {"name": "チュチューン", "name_hint": "〇⚪︎〇⚪︎〇〇", "hints": ["ロングリングロングランド編で登場", "「チュチュン!!」", "巨大な鳥、ゴーグル、背中に実況席を背負う", "「チュチュチュン!!」", "食べていない（フォクシー海賊団・イトミミズの愛鳥）"]},

      {"name": "ダズ・ボーネス", "name_hint": "〇〇⚪︎〇〇〇〇", "hints": ["アラバスタ編で登場", "「おれはMr.1だ」", "スキンヘッド、胸に「壱」の刺青、僧侶のような服", "「殺し屋に…なればよかったな」", "スパスパの実（バロックワークスの本名）"]}
    ]
  }
];

// ゲーム状態変数
let currentLevel = 1;
let score = 100;
let questions = [];
let currentQuestionIndex = 0;
let hintsUsed = 0;
let isProcessing = false;

// 指定レベルの問題プールを取得してシャッフル
function getQuestions(level) {
    let targetLevels = [];
    if (level === 1) targetLevels = [1, 2, 3, 4];
    else if (level === 2) targetLevels = [4, 5, 6, 7];
    else if (level === 3) targetLevels = [7, 8, 9, 10];

    let pool = [];
    onepieceData.forEach(data => {
        if (targetLevels.includes(data.level)) {
            pool = pool.concat(data.characters);
        }
    });

    // シャッフル
    for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, 10);
}

// 画面切り替え
function switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

// ゲーム開始
function startGame(level) {
    currentLevel = level;
    score = 100;
    questions = getQuestions(level);
    currentQuestionIndex = 0;
    
    document.getElementById('level-display').innerText = `Lv.${level}`;
    switchScreen('quiz-screen');
    renderQuestion();
}

// 問題の描画
function renderQuestion() {
    isProcessing = false;
    hintsUsed = 0;
    const q = questions[currentQuestionIndex];
    
    document.getElementById('question-count').innerText = `${currentQuestionIndex + 1} / 10 問`;
    updateScoreDisplay();
    document.getElementById('name-hint').innerText = q.name_hint;
    document.getElementById('hints-container').innerHTML = '';
    document.getElementById('answer-input').value = '';
    
    const btnHint = document.getElementById('btn-hint');
    btnHint.disabled = false;
    btnHint.innerText = 'ヒント解放 (初回無料)';
    document.getElementById('answer-input').focus();
}

// ヒントを使用
function useHint() {
    const q = questions[currentQuestionIndex];
    if (hintsUsed < q.hints.length) {
        if (hintsUsed > 0) {
            score -= 5;
            updateScoreDisplay();
        }
        
        const hintsContainer = document.getElementById('hints-container');
        const hintEl = document.createElement('div');
        hintEl.className = 'hint-item';
        hintEl.innerText = `ヒント ${hintsUsed + 1}: ${q.hints[hintsUsed]}`;
        hintsContainer.appendChild(hintEl);
        
        hintsUsed++;
        
        const btnHint = document.getElementById('btn-hint');
        if (hintsUsed >= q.hints.length) {
            btnHint.disabled = true;
            btnHint.innerText = 'ヒントなし';
        } else {
            btnHint.innerText = `ヒント解放 (-5pt)`;
        }
    }
}

// スコア表示更新
function updateScoreDisplay() {
    document.getElementById('score-display').innerText = score;
}

// 文字列の正規化（比較用）
function normalizeString(str) {
    return str.normalize('NFKC')
              .replace(/[\u30a1-\u30f6]/g, match => String.fromCharCode(match.charCodeAt(0) - 0x60)) // カタカナをひらがなに
              .replace(/[・\s　＝=,，、]/g, '') // 記号と空白を削除
              .toLowerCase();
}

// 回答チェック
function checkAnswer() {
    if (isProcessing) return;
    const input = document.getElementById('answer-input').value.trim();
    if (!input) return;

    isProcessing = true;
    const q = questions[currentQuestionIndex];
    const isCorrect = normalizeString(input) === normalizeString(q.name);

    if (isCorrect) {
        showFeedback('正解！', 'correct');
    } else {
        score -= 10; // 不正解ペナルティ（仕様上指定がないため-10と設定）
        updateScoreDisplay();
        showFeedback('不正解…', 'incorrect');
    }

    setTimeout(() => {
        proceedNext();
    }, 1200);
}

// スキップ
function skipQuestion() {
    if (isProcessing) return;
    isProcessing = true;
    score -= 25;
    updateScoreDisplay();
    showFeedback('スキップ', 'skipped');
    
    setTimeout(() => {
        proceedNext();
    }, 1200);
}

// 次の問題へ
function proceedNext() {
    currentQuestionIndex++;
    if (currentQuestionIndex < questions.length) {
        renderQuestion();
    } else {
        finishGame();
    }
}

// フィードバック表示
function showFeedback(text, className) {
    const feedback = document.getElementById('feedback');
    feedback.innerText = text;
    feedback.className = className + ' show';
    setTimeout(() => {
        feedback.classList.remove('show');
    }, 1000);
}

// Enterキー対応
function handleEnter(e) {
    if (e.key === 'Enter') {
        checkAnswer();
    }
}

// ランク判定
function getRankInfo(finalScore) {
    if (finalScore >= 90) return { rank: "ONE PIECE 博士", comment: "素晴らしい！この海の覇者だ！" };
    if (finalScore >= 70) return { rank: "ONE PIECE マニア", comment: "かなりの猛者だな！" };
    if (finalScore >= 40) return { rank: "ONE PIECE 中級者", comment: "まだまだ上を目指せるぞ！" };
    if (finalScore >= 0)  return { rank: "ONE PIECE 初級者", comment: "冒険は始まったばかりだ！" };
    return { rank: "ONE PIECE 素人", comment: "出直してきな！" };
}

// ゲーム終了
function finishGame() {
    const rankInfo = getRankInfo(score);
    document.getElementById('result-level').innerText = `レベル ${currentLevel} 結果`;
    document.getElementById('final-score').innerText = score;
    document.getElementById('final-rank').innerText = rankInfo.rank;
    document.getElementById('final-comment').innerText = rankInfo.comment;
    
    // 記録保存
    saveRecord(currentLevel, score);
    
    switchScreen('result-screen');
}

// 記録保存
function saveRecord(level, newScore) {
    const key = `op_quiz_lv${level}`;
    const currentMax = localStorage.getItem(key);
    if (currentMax === null || newScore > parseInt(currentMax)) {
        localStorage.setItem(key, newScore);
    }
}

// 記録画面表示
function showRecords() {
    document.getElementById('rec-lv1').innerText = (localStorage.getItem('op_quiz_lv1') || '-') + ' pt';
    document.getElementById('rec-lv2').innerText = (localStorage.getItem('op_quiz_lv2') || '-') + ' pt';
    document.getElementById('rec-lv3').innerText = (localStorage.getItem('op_quiz_lv3') || '-') + ' pt';
    switchScreen('record-screen');
}

// ホームへ
function showHome() {
    switchScreen('home-screen');
}

</script>
