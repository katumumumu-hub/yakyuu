<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>バトル - 魔物の塔</title>
    <style>
        /* --- 基本設定 --- */
        :root {
            --bg-color: #0f0f0f;
            --panel-bg: #222;
            --border-color: #444;
            --text-main: #f0f0f0;
            --accent-color: #c9a050;
            --hp-color: #27ae60;
            --mp-color: #2980b9;
            --atb-color: #f1c40f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }

        body { background-color: #000; color: var(--text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        #game-container { width: 100%; max-width: 430px; height: 100%; background-color: var(--bg-color); display: flex; flex-direction: column; position: relative; }

        /* --- ヘッダー（バトル中） --- */
        .battle-header {
            background-color: var(--panel-bg);
            border-bottom: 2px solid var(--accent-color);
            padding: 8px 15px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            color: var(--accent-color);
            flex-shrink: 0;
        }

        /* --- 敵エリア --- */
        .enemy-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }
        .enemy-img-box {
            width: 120px;
            height: 120px;
            background-color: #111;
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            position: relative;
        }
        .enemy-img { width: 90%; height: 90%; object-fit: cover; }
        .enemy-status {
            width: 80%;
            background: rgba(0,0,0,0.7);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }
        .enemy-name { font-weight: bold; font-size: 14px; margin-bottom: 5px; text-align: center; }
        
        /* --- メッセージエリア --- */
        .message-area {
            height: 60px;
            background-color: rgba(34, 34, 34, 0.9);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 15px;
            font-size: 13px;
            line-height: 1.4;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-shrink: 0;
        }

        /* --- パーティエリア（2x2グリッド） --- */
        .party-area {
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            background-color: #151515;
            flex-shrink: 0;
        }
        .char-card {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 6px;
            display: flex;
            gap: 8px;
            transition: 0.2s;
        }
        .char-card.active-turn {
            border-color: var(--atb-color);
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
            background-color: #333;
        }
        .char-card.dead { opacity: 0.4; }
        
        .char-icon {
            width: 45px;
            height: 45px;
            background-color: #111;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid #444;
            flex-shrink: 0;
        }
        .char-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .char-name { font-size: 11px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- ゲージ（共通） --- */
        .bar-container { display: flex; align-items: center; gap: 4px; font-size: 9px; color: #aaa; }
        .bar-label { width: 20px; }
        .bar-wrap { flex: 1; height: 6px; background-color: #111; border: 1px solid #000; border-radius: 3px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; transition: width 0.1s linear; }
        .hp-fill { background-color: var(--hp-color); }
        .mp-fill { background-color: var(--mp-color); }
        .atb-fill { background-color: var(--atb-color); }

        /* --- コマンドメニュー --- */
        .command-area {
            padding: 10px;
            background-color: var(--panel-bg);
            border-top: 2px solid var(--accent-color);
            display: none; /* ターンが来た時だけ表示 */
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }
        .cmd-row { display: flex; gap: 8px; }
        .btn-cmd {
            flex: 1;
            padding: 12px;
            background-color: #333;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-cmd:active { background-color: #555; }
        .btn-cmd.attack { border-color: #e74c3c; }
        .btn-cmd.skill { border-color: #9b59b6; }
        .btn-cmd.item { border-color: #2ecc71; }

        /* --- リザルト画面（オーバーレイ） --- */
        .result-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            display: none; /* 初期非表示 */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }
        .result-box {
            background-color: var(--panel-bg);
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            width: 100%;
            padding: 20px;
            text-align: center;
        }
        .result-title { font-size: 24px; font-weight: bold; color: var(--accent-color); margin-bottom: 15px; }
        .result-desc { font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
        .drop-list { background: #111; padding: 10px; border-radius: 4px; text-align: left; font-size: 13px; margin-bottom: 20px; }
        
        .btn-home {
            background: linear-gradient(180deg, #c9a050 0%, #a07d35 100%);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        /* アニメーション用 */
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); } }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="battle-screen" style="display: flex; flex-direction: column; height: 100%;">
        
        <div class="battle-header">
            BATTLE - 1階
        </div>

        <div class="enemy-area">
            <div class="enemy-img-box" id="enemy-sprite">
                <img src="battle.jpg" class="enemy-img">
            </div>
            <div class="enemy-status">
                <div class="enemy-name" id="en-name">スライム 【水】</div>
                <div class="bar-container"><div class="bar-label">HP</div><div class="bar-wrap"><div class="bar-fill hp-fill" id="en-hp-bar"></div></div><span id="en-hp-txt">750</span></div>
                <div class="bar-container"><div class="bar-label">MP</div><div class="bar-wrap"><div class="bar-fill mp-fill" id="en-mp-bar"></div></div><span id="en-mp-txt">150</span></div>
                <div class="bar-container"><div class="bar-label">ATB</div><div class="bar-wrap"><div class="bar-fill atb-fill" id="en-atb-bar"></div></div></div>
            </div>
        </div>

        <div class="message-area" id="msg-box">
            戦闘開始！<br>ゲージが溜まったキャラクターから行動できます。
        </div>

        <div class="party-area" id="party-area">
            </div>

        <div class="command-area" id="cmd-area">
            <div style="font-size: 12px; color: var(--accent-color); margin-bottom: 4px; text-align: center;" id="cmd-char-name">誰かのターン</div>
            <div class="cmd-row">
                <button class="btn-cmd attack" onclick="executeCommand('attack')">通常攻撃</button>
            </div>
            <div class="cmd-row">
                <button class="btn-cmd skill" onclick="executeCommand('skill')">魔法スキル<br><span style="font-size:10px; font-weight:normal;">(MP20消費)</span></button>
                <button class="btn-cmd item" onclick="executeCommand('item')">アイテム<br><span style="font-size:10px; font-weight:normal;">(HP100回復)</span></button>
            </div>
        </div>
    </div>

    <div class="result-screen" id="result-screen">
        <div class="result-box">
            <div class="result-title" id="res-title">VICTORY!!</div>
            <div class="result-desc" id="res-desc">
                魔物を討伐した！
            </div>
            <div class="drop-list" id="res-drops">
                </div>
            <div style="font-size: 11px; color: #aaa; margin-bottom: 15px;">
                ※戦闘終了により、生存・死亡に関わらず<br>全員のHP・MPが最大値の30%回復しました。
            </div>
            <button class="btn-home" onclick="location.href='index.html'">ホームへ戻る</button>
        </div>
    </div>

</div>

<script>
    // --- データ定義 ---
    let enemy = {
        name: "スライム", attr: "水",
        hp: 750, maxHp: 750, mp: 150, maxMp: 150,
        atk: 60, def: 30, spd: 85, atb: 0
    };

    let party = [
        { id: 1, name: "焔の剣士", attr: "火", hp: 1250, maxHp: 1250, mp: 522, maxMp: 522, atk: 150, def: 120, spd: 110, atb: 0 },
        { id: 2, name: "火炎の魔道士", attr: "火", hp: 800, maxHp: 800, mp: 900, maxMp: 900, atk: 40, def: 60, spd: 95, atb: 0 },
        { id: 3, name: "流水の弓使い", attr: "水", hp: 950, maxHp: 950, mp: 400, maxMp: 400, atk: 130, def: 80, spd: 140, atb: 0 },
        { id: 4, name: "雷鳴の騎士", attr: "雷", hp: 1400, maxHp: 1400, mp: 300, maxMp: 300, atk: 160, def: 150, spd: 100, atb: 0 }
    ];

    const ATB_MAX = 1000;
    let battleState = 'init'; // init, active, command, animating, end
    let activeUnit = null;    // 現在ターン進行中のユニット
    let lastFrameTime = Date.now();

    // --- 初期化 ---
    window.onload = () => {
        renderParty();
        updateGauges();
        setTimeout(() => {
            battleState = 'active';
            lastFrameTime = Date.now();
            requestAnimationFrame(battleLoop);
        }, 1500); // 1.5秒後にATB開始
    };

    function showMessage(msg) {
        document.getElementById('msg-box').innerHTML = msg;
    }

    // --- 描画・UI更新 ---
    function renderParty() {
        const container = document.getElementById('party-area');
        container.innerHTML = '';

        party.forEach((char, index) => {
            const card = document.createElement('div');
            card.className = 'char-card';
            card.id = `char-card-${index}`;
            if (char.hp <= 0) card.classList.add('dead');

            card.innerHTML = `
                <img src="character.jpg" class="char-icon">
                <div class="char-info">
                    <div class="char-name">${char.name}</div>
                    <div class="bar-container"><div class="bar-label">HP</div><div class="bar-wrap"><div class="bar-fill hp-fill" id="p-hp-bar-${index}"></div></div></div>
                    <div class="bar-container"><div class="bar-label">MP</div><div class="bar-wrap"><div class="bar-fill mp-fill" id="p-mp-bar-${index}"></div></div></div>
                    <div class="bar-container"><div class="bar-label">ATB</div><div class="bar-wrap"><div class="bar-fill atb-fill" id="p-atb-bar-${index}"></div></div></div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function updateGauges() {
        // 敵
        document.getElementById('en-hp-bar').style.width = `${(enemy.hp / enemy.maxHp) * 100}%`;
        document.getElementById('en-mp-bar').style.width = `${(enemy.mp / enemy.maxMp) * 100}%`;
        document.getElementById('en-atb-bar').style.width = `${Math.min(100, (enemy.atb / ATB_MAX) * 100)}%`;
        document.getElementById('en-hp-txt').innerText = enemy.hp;
        document.getElementById('en-mp-txt').innerText = enemy.mp;

        // 味方
        party.forEach((char, index) => {
            document.getElementById(`p-hp-bar-${index}`).style.width = `${(char.hp / char.maxHp) * 100}%`;
            document.getElementById(`p-mp-bar-${index}`).style.width = `${(char.mp / char.maxMp) * 100}%`;
            document.getElementById(`p-atb-bar-${index}`).style.width = `${Math.min(100, (char.atb / ATB_MAX) * 100)}%`;
            
            const card = document.getElementById(`char-card-${index}`);
            if (char.hp <= 0) {
                card.classList.add('dead');
                char.atb = 0; // 死んだらATBストップ
            } else {
                card.classList.remove('dead');
            }
        });
    }

    // --- バトルループ (ATB進行) ---
    function battleLoop() {
        if (battleState !== 'active') return;

        let now = Date.now();
        let deltaTime = (now - lastFrameTime) / 1000; // 経過秒数
        lastFrameTime = now;

        let turnUnit = null;

        // 全員のATBを加算 (素早さに基づく)
        [enemy, ...party].forEach(unit => {
            if (unit.hp <= 0) return;
            // 速度の10倍程度を1秒間に加算 (調整値)
            unit.atb += unit.spd * 8 * deltaTime; 
            
            if (unit.atb >= ATB_MAX && !turnUnit) {
                turnUnit = unit;
            }
        });

        updateGauges();

        // 誰かのゲージがMAXになったら
        if (turnUnit) {
            turnUnit.atb = 0; // ゲージ消費
            activeUnit = turnUnit;
            battleState = turnUnit === enemy ? 'animating' : 'command';
            
            updateGauges(); // 0になったゲージを描画

            if (turnUnit === enemy) {
                executeEnemyTurn();
            } else {
                openCommandMenu(turnUnit);
            }
        } else {
            // まだ誰も溜まっていない場合はループ続行
            requestAnimationFrame(battleLoop);
        }
    }

    // --- コマンド入力 ---
    function openCommandMenu(char) {
        // 対象キャラを光らせる
        const index = party.indexOf(char);
        document.getElementById(`char-card-${index}`).classList.add('active-turn');
        
        document.getElementById('cmd-char-name').innerText = `【${char.name}】のコマンド`;
        document.getElementById('cmd-area').style.display = 'flex';
        showMessage(`${char.name}のターン！コマンドを選択してください。`);
    }

    function executeCommand(type) {
        // メニュー非表示、ハイライト解除
        document.getElementById('cmd-area').style.display = 'none';
        const index = party.indexOf(activeUnit);
        document.getElementById(`char-card-${index}`).classList.remove('active-turn');
        
        battleState = 'animating';

        let msg = "";
        let dmg = 0;

        if (type === 'attack') {
            dmg = Math.max(1, Math.floor(activeUnit.atk - enemy.def / 2));
            enemy.hp = Math.max(0, enemy.hp - dmg);
            msg = `${activeUnit.name}の攻撃！<br>スライムに ${dmg} のダメージ！`;
            document.getElementById('enemy-sprite').classList.add('shake');
            setTimeout(() => document.getElementById('enemy-sprite').classList.remove('shake'), 300);

        } else if (type === 'skill') {
            if (activeUnit.mp >= 20) {
                activeUnit.mp -= 20;
                dmg = Math.max(1, Math.floor(activeUnit.atk * 1.5 - enemy.def / 2)); // スキルは威力1.5倍とする
                enemy.hp = Math.max(0, enemy.hp - dmg);
                msg = `${activeUnit.name}の魔法スキル！<br>スライムに ${dmg} のダメージ！`;
                document.getElementById('enemy-sprite').classList.add('shake');
                setTimeout(() => document.getElementById('enemy-sprite').classList.remove('shake'), 300);
            } else {
                msg = `MPが足りない！<br>${activeUnit.name}は何もできなかった...`;
            }
        } else if (type === 'item') {
            activeUnit.hp = Math.min(activeUnit.maxHp, activeUnit.hp + 100);
            msg = `${activeUnit.name}はアイテムを使った！<br>HPが100回復した！`;
        }

        showMessage(msg);
        updateGauges();

        // 演出待ちして次へ
        setTimeout(checkBattleEnd, 1500);
    }

    // --- 敵の自動行動 ---
    function executeEnemyTurn() {
        showMessage(`${enemy.name}の攻撃！`);
        
        setTimeout(() => {
            // 生存している味方からランダムにターゲット
            const aliveParty = party.filter(c => c.hp > 0);
            if (aliveParty.length > 0) {
                const target = aliveParty[Math.floor(Math.random() * aliveParty.length)];
                // 属性相性の簡易実装（水vs火ならダメージ1.5倍など）
                let multiplier = (enemy.attr === "水" && target.attr === "火") ? 1.5 : 1.0;
                let dmg = Math.max(1, Math.floor((enemy.atk * multiplier) - target.def / 2));
                
                target.hp = Math.max(0, target.hp - dmg);
                showMessage(`${target.name}に ${dmg} のダメージ！` + (multiplier > 1 ? "（弱点）" : ""));
                
                // 揺らす演出
                const targetIndex = party.indexOf(target);
                document.getElementById(`char-card-${targetIndex}`).classList.add('shake');
                setTimeout(() => document.getElementById(`char-card-${targetIndex}`).classList.remove('shake'), 300);
            }

            updateGauges();
            setTimeout(checkBattleEnd, 1500);
        }, 1000); // 1秒溜めてからダメージ表示
    }

    // --- 終了判定 ---
    function checkBattleEnd() {
        if (enemy.hp <= 0) {
            showResult(true);
            return;
        }
        
        const aliveCount = party.filter(c => c.hp > 0).length;
        if (aliveCount === 0) {
            showResult(false);
            return;
        }

        // 継続
        battleState = 'active';
        lastFrameTime = Date.now();
        requestAnimationFrame(battleLoop);
    }

    // --- リザルト画面表示 ---
    function showResult(isWin) {
        battleState = 'end';
        document.getElementById('battle-screen').style.display = 'none';
        const resScreen = document.getElementById('result-screen');
        resScreen.style.display = 'flex';

        if (isWin) {
            document.getElementById('res-title').innerText = "VICTORY!!";
            document.getElementById('res-title').style.color = "var(--accent-color)";
            document.getElementById('res-desc').innerText = "魔物を討伐した！";
            document.getElementById('res-drops').innerHTML = `
                <div style="font-weight:bold; margin-bottom:5px;">【獲得アイテム】</div>
                ・<img src="gold.jpg" style="width:14px; vertical-align:middle;"> 150 G<br>
                ・<img src="gray.jpg" style="width:14px; vertical-align:middle;"> 蒼魔の鉄鉱 × 1<br>
                ・<img src="White.jpg" style="width:14px; vertical-align:middle;"> 万年氷の霜葉 × 1
            `;
        } else {
            document.getElementById('res-title').innerText = "GAME OVER";
            document.getElementById('res-title').style.color = "#e74c3c";
            document.getElementById('res-desc').innerText = "パーティは全滅してしまった...";
            document.getElementById('res-drops').innerHTML = `ドロップ品はありません。`;
        }

        // 戦闘終了後のHP/MP 30%回復処理（死亡キャラも復活）
        party.forEach(char => {
            let healHp = Math.floor(char.maxHp * 0.30);
            let healMp = Math.floor(char.maxMp * 0.30);
            char.hp = Math.min(char.maxHp, char.hp + healHp);
            char.mp = Math.min(char.maxMp, char.mp + healMp);
        });
        
        // （本来はここでLocalStorage等にセーブする処理が入ります）
    }
</script>

</body>
</html>
