<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NARUTO QUIZ</title>
<style>
    :root {
        --primary-color: #ff9f43; /* ナルトカラーのオレンジ系に調整 */
        --secondary-color: #0abde3;
        --bg-color: #f1f2f6;
        --text-color: #2f3542;
        --correct-color: #1dd1a1;
        --wrong-color: #ff6b6b;
    }

    body {
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        background-color: var(--bg-color);
        background-image: radial-gradient(#ced6e0 2px, transparent 2px);
        background-size: 20px 20px;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: var(--text-color);
    }

    .container {
        background-color: white;
        border: 5px solid var(--text-color);
        border-radius: 15px;
        box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.2);
        padding: 30px;
        text-align: center;
        max-width: 800px;
        width: 90%;
        position: relative;
    }

    h1 {
        font-size: 2.5em;
        color: white;
        background-color: var(--primary-color);
        padding: 10px 20px;
        border-radius: 10px;
        border: 4px solid var(--text-color);
        margin-top: 0;
        margin-bottom: 10px;
        text-shadow: 2px 2px 0px var(--text-color);
        transform: rotate(-2deg);
        display: inline-block;
    }

    p.subtitle {
        font-size: 1.2em;
        font-weight: bold;
        margin-bottom: 20px;
        color: #57606f;
    }

    .button-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
        margin-top: 20px;
    }

    .level-btn {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        background-color: var(--secondary-color);
        color: white;
        font-size: 1.2em;
        font-weight: bold;
        padding: 15px 10px;
        border: 4px solid var(--text-color);
        border-radius: 10px;
        box-shadow: 4px 4px 0px var(--text-color);
        transition: all 0.2s ease;
        cursor: pointer;
    }

    .level-btn:hover {
        background-color: #0984e3;
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0px var(--text-color);
    }

    .level-btn:active {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0px var(--text-color);
    }

    .score-badge {
        font-size: 0.7em;
        background-color: white;
        color: var(--text-color);
        padding: 3px 8px;
        border-radius: 20px;
        margin-top: 5px;
        border: 2px solid var(--text-color);
    }

    .home-btn {
        display: inline-block;
        margin-top: 30px;
        padding: 10px 20px;
        background-color: #57606f;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        border: 3px solid var(--text-color);
        font-weight: bold;
        transition: 0.2s;
    }
    
    .home-btn:hover {
        background-color: #2f3542;
        transform: translate(-2px, -2px);
        box-shadow: 4px 4px 0px var(--text-color);
    }

    /* クイズ画面用スタイル */
    #quiz-info {
        display: flex;
        justify-content: space-between;
        font-weight: bold;
        margin-bottom: 20px;
        font-size: 1.2em;
        border-bottom: 3px dashed #ced6e0;
        padding-bottom: 10px;
    }

    #question-text {
        font-size: 1.5em;
        font-weight: bold;
        margin-bottom: 30px;
        line-height: 1.4;
    }

    .option-btn {
        display: block;
        width: 100%;
        background-color: white;
        color: var(--text-color);
        font-size: 1.2em;
        font-weight: bold;
        padding: 15px;
        margin-bottom: 15px;
        border: 4px solid var(--text-color);
        border-radius: 10px;
        box-shadow: 4px 4px 0px var(--text-color);
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: left;
    }

    .option-btn:hover {
        background-color: #f1f2f6;
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0px var(--text-color);
    }

    .option-btn.correct {
        background-color: var(--correct-color);
        color: white;
    }

    .option-btn.wrong {
        background-color: var(--wrong-color);
        color: white;
    }

    /* 結果画面用スタイル */
    #result-score {
        font-size: 4em;
        font-weight: bold;
        color: var(--primary-color);
        text-shadow: 2px 2px 0px var(--text-color);
        margin: 20px 0;
    }

    #result-comment {
        font-size: 1.5em;
        font-weight: bold;
        margin-bottom: 30px;
        color: #e15f41;
    }

    .hidden {
        display: none !important;
    }
</style>
</head>
<body>

<div class="container" id="screen-home">
    <h1>NARUTO QUIZ</h1>
    <p class="subtitle">挑戦したいレベルを選んでね！<br>（100点からの減点方式）</p>
    <div id="level-list" class="button-grid">
        </div>
    <a href="../index.html" class="home-btn">🏠 ポータルホームに戻る</a>
</div>

<div class="container hidden" id="screen-quiz">
    <div id="quiz-info">
        <span id="display-level">LEVEL 1</span>
        <span id="display-progress">1 / 10 問</span>
        <span id="display-score" style="color: var(--primary-color);">残点: 100</span>
    </div>
    <div id="question-text">ここに問題文が表示されます</div>
    <div id="options-container">
        </div>
</div>

<div class="container hidden" id="screen-result">
    <h1>結果発表</h1>
    <div id="result-score">100点</div>
    <div id="result-comment">火影クラス！</div>
    <div style="display: flex; justify-content: center; gap: 15px; margin-top: 20px;">
        <button onclick="showHome()" class="level-btn" style="background-color: var(--secondary-color);">レベル選択へ</button>
    </div>
</div>

<script>

        {"level": 1, "question": "ナルトのチームメイトはうちはサスケと誰？", "options": ["春野サクラ", "日向ヒナタ", "山中いの", "テンテン"], "answer": "春野サクラ"},

        {"level": 10, "question": "ミナトの異名「黄色い閃光」の由来となった術は？", "options": ["飛雷神の術", "螺旋丸", "瞬身の術", "影分身の術"], "answer": "飛雷神の術"},
        {"level": 10, "question": "君麻呂の血継限界「屍骨脈」を持つ一族の名前は？", "options": ["かぐや一族", "雪一族", "鬼灯一族", "水無月一族"], "answer": "かぐや一族"},
        {"level": 10, "question": "ナルトの仙人モード修行で、カエルの油を塗るとどうなる？", "options": ["カエルになる", "チャクラが増える", "透明になる", "肌が硬くなる"], "answer": "カエルになる"}
    ];

    // 変数
    let currentLevel = 1;
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 100; // 減点方式
    let isAnswering = false;

    // LocalStorage関連
    const STORAGE_KEY = 'naruto_quiz_scores';
    function getScores() {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : {};
    }
    function saveScore(level, newScore) {
        const scores = getScores();
        // 過去の記録がないか、今回のスコアの方が高ければ更新
        if (scores[level] === undefined || newScore > scores[level]) {
            scores[level] = newScore;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
        }
    }

    // 画面切り替え関数
    function hideAllScreens() {
        document.getElementById('screen-home').classList.add('hidden');
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-result').classList.add('hidden');
    }

    // 初期化：レベルボタンの生成
    function initHome() {
        const container = document.getElementById('level-list');
        container.innerHTML = '';
        const scores = getScores();

        for (let i = 1; i <= 10; i++) {
            const btn = document.createElement('div');
            btn.className = 'level-btn';
            
            // 記録の表示
            let scoreText = scores[i] !== undefined ? `最高: ${scores[i]}点` : '未挑戦';
            
            btn.innerHTML = `LEVEL ${i} <span class="score-badge">${scoreText}</span>`;
            btn.onclick = () => startQuiz(i);
            container.appendChild(btn);
        }
    }

    function showHome() {
        hideAllScreens();
        initHome();
        document.getElementById('screen-home').classList.remove('hidden');
    }

    // クイズ開始
    function startQuiz(level) {
        currentLevel = level;
        currentQuestions = quizData.filter(q => q.level === level);
        currentQuestionIndex = 0;
        score = 100; // 初期100点
        
        document.getElementById('display-level').innerText = `LEVEL ${level}`;
        updateScoreDisplay();

        hideAllScreens();
        document.getElementById('screen-quiz').classList.remove('hidden');
        
        showQuestion();
    }

    function updateScoreDisplay() {
        document.getElementById('display-score').innerText = `残点: ${score}`;
    }

    // 問題の表示
    function showQuestion() {
        isAnswering = false;
        const q = currentQuestions[currentQuestionIndex];
        
        document.getElementById('display-progress').innerText = `${currentQuestionIndex + 1} / 10 問`;
        document.getElementById('question-text').innerText = q.question;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        // 選択肢をランダムにシャッフル
        const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, q.answer);
            optionsContainer.appendChild(btn);
        });
    }

    // 答え合わせ（減点処理）
    function checkAnswer(clickedBtn, selected, correct) {
        if (isAnswering) return;
        isAnswering = true;

        const allBtns = document.querySelectorAll('.option-btn');
        
        if (selected === correct) {
            clickedBtn.classList.add('correct');
        } else {
            clickedBtn.classList.add('wrong');
            score -= 10; // 間違えたら10点減点
            if (score < 0) score = 0;
            updateScoreDisplay();
            
            // 正解のボタンも色を変える
            allBtns.forEach(btn => {
                if (btn.innerText === correct) btn.classList.add('correct');
            });
        }

        // 1秒待って次の問題へ
        setTimeout(() => {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuestions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }, 1000);
    }

    // 結果表示
    function showResult() {
        saveScore(currentLevel, score);

        let comment = "";
        if (score === 100) {
            comment = "火影クラス！完璧だってばよ！";
        } else if (score >= 80) {
            comment = "上忍クラス！やるじゃん！";
        } else if (score >= 50) {
            comment = "中忍クラス！もう少し修行が必要だな！";
        } else if (score >= 10) {
            comment = "下忍クラス！基礎からやり直そう！";
        } else {
            comment = "アカデミー生クラス…一楽でラーメン食べて出直してこい！";
        }

        document.getElementById('result-score').innerText = `${score} 点`;
        document.getElementById('result-comment').innerText = comment;

        hideAllScreens();
        document.getElementById('screen-result').classList.remove('hidden');
    }

    // 初期起動
    window.onload = initHome;

</script>
