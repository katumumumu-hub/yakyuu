<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONE PIECE クイズ</title>
<style>
    :root {
        --bg-color: #d2b48c;
        --poster-bg: #fdf5e6;
        --border-color: #5a3a22;
        --text-color: #332211;
        --btn-color: #8b0000;
        --btn-hover: #a52a2a;
    }
    
    body {
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        background-color: var(--bg-color);
        background-image: linear-gradient(45deg, rgba(0,0,0,0.05) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.05) 75%, rgba(0,0,0,0.05)), 
                          linear-gradient(45deg, rgba(0,0,0,0.05) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.05) 75%, rgba(0,0,0,0.05));
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: var(--text-color);
    }

    #app {
        width: 100%;
        max-width: 600px;
        background-color: var(--poster-bg);
        border: 8px solid var(--border-color);
        border-radius: 4px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        padding: 20px;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
    }

    .screen {
        display: none;
        flex-direction: column;
        align-items: center;
    }

    .screen.active {
        display: flex;
    }

    h1 {
        font-family: serif;
        font-size: 2.5em;
        text-align: center;
        margin: 0 0 20px 0;
        border-bottom: 3px double var(--border-color);
        padding-bottom: 10px;
        letter-spacing: 2px;
    }

    h2 {
        font-size: 1.5em;
        margin-bottom: 15px;
        text-align: center;
    }

    button {
        background-color: var(--btn-color);
        color: white;
        border: 2px solid #330000;
        padding: 12px 20px;
        font-size: 1.1em;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
        margin: 10px;
        width: 80%;
        max-width: 300px;
        transition: background-color 0.2s, transform 0.1s;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }

    button:hover {
        background-color: var(--btn-hover);
    }

    button:active {
        transform: scale(0.98);
        box-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }

    button:disabled {
        background-color: #888;
        cursor: not-allowed;
        border-color: #555;
    }

    /* クイズ画面用スタイル */
    .header-info {
        width: 100%;
        display: flex;
        justify-content: space-between;
        font-size: 1.2em;
        font-weight: bold;
        margin-bottom: 15px;
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 10px;
    }

    .pt-display {
        color: #d32f2f;
    }

    .name-hint-box {
        font-size: 2em;
        letter-spacing: 5px;
        margin: 20px 0;
        padding: 15px;
        background-color: rgba(255,255,255,0.5);
        border: 2px dashed var(--border-color);
        border-radius: 5px;
        text-align: center;
        width: 100%;
        box-sizing: border-box;
    }

    .hints-container {
        width: 100%;
        min-height: 180px;
        margin-bottom: 15px;
    }

    .hint-item {
        background-color: #f0e6d2;
        border-left: 5px solid var(--border-color);
        padding: 10px;
        margin-bottom: 8px;
        font-size: 1.1em;
        animation: fadeIn 0.3s ease-in-out;
    }

    input[type="text"] {
        width: 90%;
        padding: 12px;
        font-size: 1.2em;
        border: 2px solid var(--border-color);
        border-radius: 5px;
        margin-bottom: 15px;
        text-align: center;
        background-color: #fff;
    }

    .action-buttons {
        display: flex;
        justify-content: center;
        width: 100%;
        gap: 10px;
    }

    .action-buttons button {
        width: 45%;
        margin: 0;
    }

    .btn-skip {
        background-color: #4a4a4a !important;
    }
    .btn-skip:hover {
        background-color: #6a6a6a !important;
    }

    /* 結果画面用スタイル */
    .result-score {
        font-size: 3em;
        color: #d32f2f;
        font-weight: bold;
        margin: 20px 0;
    }

    .result-rank {
        font-size: 2em;
        font-weight: bold;
        margin: 10px 0;
    }

    .result-comment {
        font-size: 1.2em;
        margin-bottom: 30px;
        text-align: center;
        padding: 0 20px;
    }

    /* 記録画面用スタイル */
    .record-table {
        width: 80%;
        border-collapse: collapse;
        margin-bottom: 30px;
    }
    .record-table th, .record-table td {
        border: 1px solid var(--border-color);
        padding: 10px;
        text-align: center;
        font-size: 1.2em;
    }
    .record-table th {
        background-color: rgba(90, 58, 34, 0.2);
    }

    /* フィードバックアニメーション */
    #feedback {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        font-size: 4em;
        font-weight: bold;
        z-index: 10;
        text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
        pointer-events: none;
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #feedback.show {
        transform: translate(-50%, -50%) scale(1);
    }
    .correct { color: #4CAF50; }
    .incorrect { color: #F44336; }
    .skipped { color: #FF9800; }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div id="app">
    <div id="home-screen" class="screen active">
        <h1>WANTED<br><span style="font-size: 0.6em">ONE PIECE クイズ</span></h1>
        <h2>モードを選択してください</h2>
        <button onclick="switchScreen('level-select-chara-screen')">キャラ当てクイズ</button>
        <button onclick="switchScreen('level-select-4choice-screen')">4択クイズ</button>
        <div style="height: 20px;"></div>
        <button onclick="showRecords()" style="background-color: #5a3a22;">記録を見る</button>
        <button onclick="window.location.href='../index.html'" style="background-color: #4a4a4a;">アニメ選択へ戻る</button>
    </div>

    <div id="level-select-chara-screen" class="screen">
        <h1>WANTED<br><span style="font-size: 0.6em">キャラ当てクイズ</span></h1>
        <h2>難易度を選択してください</h2>
        <button onclick="startCharaGame(1)">レベル 1</button>
        <button onclick="startCharaGame(2)">レベル 2</button>
        <button onclick="startCharaGame(3)">レベル 3</button>
        <div style="height: 20px;"></div>
        <button onclick="showHome()" style="background-color: #5a3a22;">戻る</button>
    </div>

    <div id="level-select-4choice-screen" class="screen">
        <h1>WANTED<br><span style="font-size: 0.6em">4択クイズ</span></h1>
        <h2>難易度を選択してください</h2>
        <button onclick="start4ChoiceGame(1)">レベル 1</button>
        <button onclick="start4ChoiceGame(2)">レベル 2</button>
        <button onclick="start4ChoiceGame(3)">レベル 3</button>
        <div style="height: 20px;"></div>
        <button onclick="showHome()" style="background-color: #5a3a22;">戻る</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="header-info">
            <span id="level-display">Lv.1</span>
            <span id="question-count">1 / 10 問</span>
            <span class="pt-display">残pt: <span id="score-display">100</span></span>
        </div>
        <div id="name-hint" class="name-hint-box">〇〇〇〇⚪︎〇〇</div>
        
        <button id="btn-hint" onclick="useHint()">ヒント解放 (初回無料)</button>
        
        <div id="hints-container" class="hints-container"></div>
        
        <input type="text" id="answer-input" placeholder="キャラクター名を入力" autocomplete="off" onkeypress="handleEnter(event)">
        
        <div class="action-buttons">
            <button onclick="checkAnswer()">回答する</button>
            <button class="btn-skip" onclick="skipQuestion()">次へ (-25pt)</button>
        </div>
    </div>

    <div id="quiz-4choice-screen" class="screen">
        <div class="header-info">
            <span id="level-display-4c">Lv.1</span>
            <span id="question-count-4c">1 / 10 問</span>
            <span class="pt-display">残pt: <span id="score-display-4c">100</span></span>
        </div>
        <div id="question-text-4c" style="font-size: 1.2em; margin: 20px 0; text-align: center; min-height: 80px; font-weight: bold; width: 100%;"></div>
        
        <div style="display: flex; flex-direction: column; width: 100%; align-items: center; margin-top: 10px;">
            <button id="btn-opt-A" style="width: 95%; margin: 5px; font-size: 1.1em; padding: 15px;"></button>
            <button id="btn-opt-B" style="width: 95%; margin: 5px; font-size: 1.1em; padding: 15px;"></button>
            <button id="btn-opt-C" style="width: 95%; margin: 5px; font-size: 1.1em; padding: 15px;"></button>
            <button id="btn-opt-D" style="width: 95%; margin: 5px; font-size: 1.1em; padding: 15px;"></button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h2 id="result-level">レベル 1 結果</h2>
        <div>残pt</div>
        <div id="final-score" class="result-score">100</div>
        <div id="final-rank" class="result-rank">ONE PIECE 博士</div>
        <div id="final-comment" class="result-comment">完璧だ！君こそが次の海賊王だ！</div>
        <button onclick="showHome()">ホームに戻る</button>
    </div>

    <div id="record-screen" class="screen">
        <h1>自己最高記録</h1>
        <table class="record-table">
            <tr><th>レベル 1</th><td id="rec-lv1">- pt</td></tr>
            <tr><th>レベル 2</th><td id="rec-lv2">- pt</td></tr>
            <tr><th>レベル 3</th><td id="rec-lv3">- pt</td></tr>
        </table>
        <button onclick="showHome()">ホームに戻る</button>
    </div>

    <div id="feedback"></div>
</div>

<script>
// ==================== ゲーム状態変数 ====================
let onepieceData = [];
let onepiece4ChoiceData = [];
let isDataLoaded = false;

let currentMode = 'chara'; // 'chara' or '4choice'
let currentLevel = 1;
let score = 100;
let questions = [];
let current4ChoiceQuestions = [];
let currentQuestionIndex = 0;
let hintsUsed = 0;
let isProcessing = false;

// ==================== JSONデータの読み込み ====================
window.onload = async function() {
    try {
        // 同じフォルダにあるjsonファイルを読み込む
        const [res1, res2] = await Promise.all([
            fetch('./onepiece.json'),
            fetch('./onepiece2.json')
        ]);
        
        if (!res1.ok || !res2.ok) {
            throw new Error('JSONファイルの取得に失敗しました');
        }
        
        onepieceData = await res1.json();
        onepiece4ChoiceData = await res2.json();
        isDataLoaded = true;
    } catch (error) {
        console.error('データの読み込みに失敗しました:', error);
        alert('クイズデータの読み込みに失敗しました。GitHub Pagesに反映されるまで少し時間がかかる場合があります。');
    }
};

// ==================== 共通関数 ====================
// 画面切り替え
function switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

// ホームへ
function showHome() {
    switchScreen('home-screen');
}

// フィードバック表示
function showFeedback(text, className) {
    const feedback = document.getElementById('feedback');
    feedback.innerText = text;
    feedback.className = className + ' show';
    setTimeout(() => {
        feedback.classList.remove('show');
    }, 1000);
}

// ランク判定
function getRankInfo(finalScore) {
    if (finalScore >= 90) return { rank: "ONE PIECE 博士", comment: "素晴らしい！この海の覇者だ！" };
    if (finalScore >= 70) return { rank: "ONE PIECE マニア", comment: "かなりの猛者だな！" };
    if (finalScore >= 40) return { rank: "ONE PIECE 中級者", comment: "まだまだ上を目指せるぞ！" };
    if (finalScore >= 0)  return { rank: "ONE PIECE 初級者", comment: "冒険は始まったばかりだ！" };
    return { rank: "ONE PIECE 素人", comment: "出直してきな！" };
}

// ゲーム終了処理
function finishGame() {
    const rankInfo = getRankInfo(score);
    const prefix = currentMode === 'chara' ? 'キャラ当て' : '4択クイズ';
    document.getElementById('result-level').innerText = `${prefix} レベル ${currentLevel} 結果`;
    document.getElementById('final-score').innerText = score;
    document.getElementById('final-rank').innerText = rankInfo.rank;
    document.getElementById('final-comment').innerText = rankInfo.comment;
    
    // 記録保存 (既存のキャラ当てクイズの記録のみを保存/表示する仕様に基づく)
    saveRecord(currentLevel, score);
    
    switchScreen('result-screen');
}

// 記録保存 (キャラ当て用)
function saveRecord(level, newScore) {
    if (currentMode === 'chara') {
        const key = `op_quiz_lv${level}`;
        const currentMax = localStorage.getItem(key);
        if (currentMax === null || newScore > parseInt(currentMax)) {
            localStorage.setItem(key, newScore);
        }
    }
}

// 記録画面表示 (キャラ当て用)
function showRecords() {
    document.getElementById('rec-lv1').innerText = (localStorage.getItem('op_quiz_lv1') || '-') + ' pt';
    document.getElementById('rec-lv2').innerText = (localStorage.getItem('op_quiz_lv2') || '-') + ' pt';
    document.getElementById('rec-lv3').innerText = (localStorage.getItem('op_quiz_lv3') || '-') + ' pt';
    switchScreen('record-screen');
}


// ==================== キャラ当てクイズ用関数 ====================
// 指定レベルの問題プールを取得してシャッフル (キャラ当て用)
function getQuestions(level) {
    let targetLevels = [];
    if (level === 1) targetLevels = [1, 2, 3, 4];
    else if (level === 2) targetLevels = [4, 5, 6, 7];
    else if (level === 3) targetLevels = [7, 8, 9, 10];

    let pool = [];
    onepieceData.forEach(data => {
        if (targetLevels.includes(data.level)) {
            pool = pool.concat(data.characters);
        }
    });
    // シャッフル
    for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, 10);
}

// キャラ当てゲーム開始
function startCharaGame(level) {
    if (!isDataLoaded) {
        alert('クイズデータを読み込んでいます。少々お待ちください。');
        return;
    }
    currentMode = 'chara';
    currentLevel = level;
    score = 100;
    questions = getQuestions(level);
    currentQuestionIndex = 0;
    
    document.getElementById('level-display').innerText = `Lv.${level}`;
    switchScreen('quiz-screen');
    renderQuestion();
}

// 問題の描画 (キャラ当て用)
function renderQuestion() {
    isProcessing = false;
    hintsUsed = 0;
    const q = questions[currentQuestionIndex];
    
    document.getElementById('question-count').innerText = `${currentQuestionIndex + 1} / 10 問`;
    updateScoreDisplay();
    document.getElementById('name-hint').innerText = q.name_hint;
    document.getElementById('hints-container').innerHTML = '';
    document.getElementById('answer-input').value = '';
    
    const btnHint = document.getElementById('btn-hint');
    btnHint.disabled = false;
    btnHint.innerText = 'ヒント解放 (初回無料)';
    document.getElementById('answer-input').focus();
}

// ヒントを使用 (キャラ当て用)
function useHint() {
    const q = questions[currentQuestionIndex];
    if (hintsUsed < q.hints.length) {
        if (hintsUsed > 0) {
            score -= 5;
            updateScoreDisplay();
        }
        
        const hintsContainer = document.getElementById('hints-container');
        const hintEl = document.createElement('div');
        hintEl.className = 'hint-item';
        hintEl.innerText = `ヒント ${hintsUsed + 1}: ${q.hints[hintsUsed]}`;
        hintsContainer.appendChild(hintEl);
        
        hintsUsed++;
        
        const btnHint = document.getElementById('btn-hint');
        if (hintsUsed >= q.hints.length) {
            btnHint.disabled = true;
            btnHint.innerText = 'ヒントなし';
        } else {
            btnHint.innerText = `ヒント解放 (-5pt)`;
        }
    }
}

// スコア表示更新 (キャラ当て用)
function updateScoreDisplay() {
    document.getElementById('score-display').innerText = score;
}

// 文字列の正規化（比較用）
function normalizeString(str) {
    return str.normalize('NFKC')
              .replace(/[\u30a1-\u30f6]/g, match => String.fromCharCode(match.charCodeAt(0) - 0x60)) // カタカナをひらがなに
              .replace(/[・\s　＝=,，、]/g, '') // 記号と空白を削除
              .toLowerCase();
}

// 回答チェック (キャラ当て用)
function checkAnswer() {
    if (isProcessing) return;
    const input = document.getElementById('answer-input').value.trim();
    if (!input) return;

    isProcessing = true;
    const q = questions[currentQuestionIndex];
    const isCorrect = normalizeString(input) === normalizeString(q.name);

    if (isCorrect) {
        showFeedback('正解！', 'correct');
    } else {
        score -= 10;
        updateScoreDisplay();
        showFeedback('不正解…', 'incorrect');
    }

    setTimeout(() => {
        proceedNext();
    }, 1200);
}

// スキップ (キャラ当て用)
function skipQuestion() {
    if (isProcessing) return;
    isProcessing = true;
    score -= 25;
    updateScoreDisplay();
    showFeedback('スキップ', 'skipped');
    
    setTimeout(() => {
        proceedNext();
    }, 1200);
}

// 次の問題へ (キャラ当て用)
function proceedNext() {
    currentQuestionIndex++;
    if (currentQuestionIndex < questions.length) {
        renderQuestion();
    } else {
        finishGame();
    }
}

// Enterキー対応 (キャラ当て用)
function handleEnter(e) {
    if (currentMode === 'chara' && e.key === 'Enter') {
        checkAnswer();
    }
}


// ==================== 4択クイズ用関数 ====================
// 指定レベルの問題プールを取得してシャッフル (4択用)
function get4ChoiceQuestions(level) {
    let targetLevels = [];
    if (level === 1) targetLevels = [1, 2, 3, 4];
    else if (level === 2) targetLevels = [4, 5, 6, 7];
    else if (level === 3) targetLevels = [7, 8, 9, 10];

    let pool = [];
    onepiece4ChoiceData.forEach(data => {
        if (targetLevels.includes(data.level)) {
            pool = pool.concat(data.questions);
        }
    });
    // シャッフル
    for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, 10);
}

// 4択ゲーム開始
function start4ChoiceGame(level) {
    if (!isDataLoaded) {
        alert('クイズデータを読み込んでいます。少々お待ちください。');
        return;
    }
    currentMode = '4choice';
    currentLevel = level;
    score = 100;
    current4ChoiceQuestions = get4ChoiceQuestions(level);
    currentQuestionIndex = 0;
    
    document.getElementById('level-display-4c').innerText = `Lv.${level}`;
    switchScreen('quiz-4choice-screen');
    render4ChoiceQuestion();
}

// 4択問題の描画
function render4ChoiceQuestion() {
    isProcessing = false;
    const q = current4ChoiceQuestions[currentQuestionIndex];
    
    document.getElementById('question-count-4c').innerText = `${currentQuestionIndex + 1} / 10 問`;
    document.getElementById('score-display-4c').innerText = score;
    document.getElementById('question-text-4c').innerText = q.question;
    
    const btnA = document.getElementById('btn-opt-A');
    const btnB = document.getElementById('btn-opt-B');
    const btnC = document.getElementById('btn-opt-C');
    const btnD = document.getElementById('btn-opt-D');
    
    btnA.innerText = q.options.A; btnA.onclick = () => check4ChoiceAnswer('A');
    btnB.innerText = q.options.B; btnB.onclick = () => check4ChoiceAnswer('B');
    btnC.innerText = q.options.C; btnC.onclick = () => check4ChoiceAnswer('C');
    btnD.innerText = q.options.D; btnD.onclick = () => check4ChoiceAnswer('D');
}

// 4択の回答チェック
function check4ChoiceAnswer(selectedOption) {
    if (isProcessing) return;
    isProcessing = true;
    
    const q = current4ChoiceQuestions[currentQuestionIndex];
    if (selectedOption === q.answer) {
        showFeedback('正解！', 'correct');
    } else {
        score -= 10;
        document.getElementById('score-display-4c').innerText = score;
        showFeedback('不正解…', 'incorrect');
    }
    
    setTimeout(() => {
        proceedNext4Choice();
    }, 1200);
}

// 4択の次の問題へ
function proceedNext4Choice() {
    currentQuestionIndex++;
    if (currentQuestionIndex < current4ChoiceQuestions.length) {
        render4ChoiceQuestion();
    } else {
        finishGame();
    }
}

</script>
</body>
</html>
