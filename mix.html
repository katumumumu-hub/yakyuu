<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>合成 - 魔物の塔</title>
    <style>
        /* --- 基本設定（他画面と共通） --- */
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --border-color: #4a4a4a;
            --text-main: #f0f0f0;
            --text-sub: #a0a0a0;
            --accent-color: #c9a050; /* ゴールド */
            --highlight-color: #e67e22;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }

        body { background-color: #000; color: var(--text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        #game-container { width: 100%; max-width: 430px; height: 100%; background-color: var(--bg-color); display: flex; flex-direction: column; position: relative; }

        /* --- ヘッダー --- */
        .header { background-color: var(--panel-bg); border-bottom: 2px solid var(--accent-color); padding: 8px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; font-size: 14px; }
        .header-box { border: 1px solid var(--border-color); background-color: #222; padding: 4px; text-align: center; border-radius: 4px; }
        .gold-info { color: #ffd700; display: flex; align-items: center; justify-content: center; gap: 4px; font-weight: bold;}
        .gold-img { width: 14px; height: 14px; border-radius: 50%; }

        /* --- スクロール可能メインエリア --- */
        .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

        /* --- 壺エリア --- */
        .pot-area {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            background: radial-gradient(circle, rgba(201,160,80,0.15) 0%, rgba(26,26,26,0) 70%);
        }
        .pot-img-box {
            width: 140px;
            height: 140px;
            background-color: #111;
            border: 3px solid var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(201, 160, 80, 0.4), inset 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }
        /* 壺の代わりの合成アイコン */
        .pot-icon { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; }

        /* --- セットするスロットエリア --- */
        .slots-container { display: flex; flex-direction: column; gap: 15px; padding: 0 15px 15px 15px; }
        .slot-row { display: flex; justify-content: center; gap: 15px; }
        
        .set-slot {
            width: 65px;
            height: 65px;
            background-color: #222;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--text-sub);
            cursor: pointer;
            text-align: center;
            line-height: 1.3;
            transition: all 0.2s;
        }
        .set-slot:hover { border-color: var(--accent-color); background-color: #2a2a2a; }
        .set-slot.required { border-style: solid; border-color: #666; }
        .set-slot span.slot-label { font-weight: bold; color: #ccc; }

        /* --- 合成時間選択 --- */
        .time-select-area { padding: 0 15px; }
        .section-title { font-size: 13px; color: var(--text-sub); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .section-title::before, .section-title::after { content: ""; flex: 1; height: 1px; background-color: var(--border-color); }
        
        .time-buttons { display: flex; gap: 5px; }
        .time-btn {
            flex: 1;
            padding: 10px 0;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .time-btn.active {
            background-color: var(--highlight-color);
            color: #fff;
            font-weight: bold;
            border-color: var(--highlight-color);
            box-shadow: 0 0 10px rgba(230, 126, 34, 0.4);
        }

        /* --- 詳細情報表示 --- */
        .info-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .info-row { display: flex; justify-content: space-between; align-items: center; font-size: 15px; }
        .info-label { color: var(--text-sub); font-size: 13px; }
        .info-value { font-weight: bold; font-size: 18px; color: #fff; }
        .rate-value { color: var(--accent-color); font-size: 22px; }

        /* --- 合成開始ボタン --- */
        .btn-start {
            background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: 1px solid #922b21;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            margin: 0 15px 15px 15px;
            cursor: pointer;
            box-shadow: 0 4px 0 #7b241c, 0 5px 10px rgba(0,0,0,0.5);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            transition: 0.1s;
        }
        .btn-start:active { transform: translateY(4px); box-shadow: 0 0 0 #7b241c, 0 1px 2px rgba(0,0,0,0.5); }

        /* --- ボトムナビ --- */
        .bottom-nav { display: flex; background-color: #111; height: 60px; border-top: 1px solid #000; flex-shrink: 0;}
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #777; font-size: 11px; text-decoration: none; border-right: 1px solid #222; }
        .nav-btn:last-child { border-right: none; }
        .nav-btn.active { color: var(--accent-color); background-color: #222; }
        .nav-img { width: 28px; height: 28px; margin-bottom: 2px; border-radius: 6px; object-fit: cover; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div class="header-box">探索者</div>
        <div class="header-box">20階</div>
        <div class="header-box gold-info">
            <img src="gold.jpg" class="gold-img"> 1250G
        </div>
    </div>

    <div class="main-content">
        
        <div class="pot-area">
            <div class="pot-img-box">
                <img src="mix.jpg" alt="合成壺" class="pot-icon">
            </div>
        </div>

        <div class="slots-container">
            <div class="section-title">素材の投入（全5枠）</div>
            
            <div class="slot-row">
                <div class="set-slot required">
                    <span class="slot-label">魔力玉</span>
                    <span>(必須)</span>
                </div>
                <div class="set-slot">
                    <span class="slot-label" style="color: #3498db;">手助け</span>
                    <span>(任意)</span>
                </div>
            </div>
            
            <div class="slot-row">
                <div class="set-slot required">
                    <span class="slot-label">素材 1</span>
                    <span>(必須)</span>
                </div>
                <div class="set-slot required">
                    <span class="slot-label">素材 2</span>
                    <span>(必須)</span>
                </div>
                <div class="set-slot required">
                    <span class="slot-label">素材 3</span>
                    <span>(必須)</span>
                </div>
            </div>
        </div>

        <div class="time-select-area">
            <div class="section-title">合成時間の選択</div>
            <div class="time-buttons">
                <div class="time-btn" onclick="selectTime(20, 20, '00:20:00', this)">20分</div>
                <div class="time-btn active" onclick="selectTime(60, 60, '01:00:00', this)">1時間</div>
                <div class="time-btn" onclick="selectTime(180, 85, '03:00:00', this)">3時間</div>
                <div class="time-btn" onclick="selectTime(360, 99, '06:00:00', this)">6時間</div>
            </div>
        </div>

        <div class="info-panel">
            <div class="info-row">
                <span class="info-label">所要時間</span>
                <span class="info-value" id="disp-time">01:00:00</span>
            </div>
            <div class="info-row">
                <span class="info-label">基本成功確率</span>
                <span class="info-value rate-value" id="disp-rate">60%</span>
            </div>
            <div style="font-size: 11px; color: var(--text-sub); text-align: right; margin-top: -5px;">
                ※失敗時、素材と魔力玉は消失します
            </div>
        </div>

        <button class="btn-start" onclick="startMix()">合成を開始する</button>

    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-btn">
            <img src="home.jpg" alt="ホーム" class="nav-img">
            <div>ホーム</div>
        </a>
        <a href="#" class="nav-btn">
            <img src="character.jpg" alt="仲間" class="nav-img">
            <div>仲間</div>
        </a>
        <a href="#" class="nav-btn">
            <img src="battle.jpg" alt="バトル" class="nav-img">
            <div>バトル</div>
        </a>
        <a href="mix.html" class="nav-btn active">
            <img src="mix.jpg" alt="合成" class="nav-img">
            <div>合成</div>
        </a>
        <a href="shop.html" class="nav-btn">
            <img src="shop.jpg" alt="ショップ" class="nav-img">
            <div>ショップ</div>
        </a>
        <a href="item.html" class="nav-btn">
            <img src="item.jpg" alt="アイテム" class="nav-img">
            <div>アイテム</div>
        </a>
    </div>
</div>

<script>
    // 時間選択時の処理
    function selectTime(minutes, rate, timeString, element) {
        // 全ボタンからactiveクラスを外す
        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        // クリックしたボタンをactiveにする
        element.classList.add('active');

        // パネルの表示を更新
        document.getElementById('disp-time').innerText = timeString;
        document.getElementById('disp-rate').innerText = rate + "%";
    }

    // 合成開始ボタン押下時のダミーアクション
    function startMix() {
        // ※実際にはスロットにアイテムがセットされているかの判定が入ります
        alert("素材をセットしてください！");
    }
</script>

</body>
</html>
